<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .hidden { display: none !important; }
  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --grey:  #888;
    --mid:   #1a1a1a;
    --line:  #252525;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--black);
    color: var(--white);
    user-select: none;
  }

  /* ── Top bar ────────────────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0; height: 40px;
    background: var(--black);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    z-index: 100;
  }
  #app-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem; letter-spacing: .12em;
    color: var(--white); flex-shrink: 0;
  }
  #app-sub {
    font-size: .6rem; color: var(--grey);
    letter-spacing: .05em; margin-left: .35rem; flex-shrink: 0;
  }
  .tb-btn {
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line); border-radius: 2px;
    padding: 4px 11px; font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; transition: background .1s, border-color .1s;
    white-space: nowrap; flex-shrink: 0;
  }
  .tb-btn:hover  { background: #2a2a2a; border-color: #444; }
  .tb-btn:active { background: #333; }
  #tb-account { display: flex; align-items: center; gap: 6px; }
  .sync-dot { font-size: .9rem; line-height: 1; cursor: default; }

  /* ── Bottom floating bar ────────────────────────────────── */
  #bottom-bar {
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--black);
    border: 1px solid var(--line);
    border-radius: 28px;
    display: flex; align-items: center;
    padding: 5px 8px; gap: 2px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.55);
  }
  .bb-btn {
    background: transparent; border: none; border-radius: 20px;
    color: var(--white); font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
    padding: 6px 13px; cursor: pointer;
    transition: background .12s; white-space: nowrap;
  }
  .bb-btn:hover  { background: var(--mid); }
  .bb-btn:active { background: #2a2a2a; }
  .bb-btn.primary { background: var(--white); color: var(--black); }
  .bb-btn.primary:hover { background: #ddd; }
  .bb-sep { width: 1px; height: 16px; background: var(--line); margin: 0 3px; flex-shrink: 0; }

  /* ── Zoom bar ───────────────────────────────────────────── */
  #zoom-bar {
    position: fixed;
    bottom: 20px; right: 16px;
    background: var(--black); border: 1px solid var(--line);
    border-radius: 4px;
    display: flex; align-items: center; gap: 1px;
    padding: 3px 4px; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .zb-btn {
    background: transparent; border: none; border-radius: 2px;
    color: var(--white); font-family: 'DM Mono', monospace;
    font-size: .72rem; padding: 3px 9px; cursor: pointer;
    transition: background .1s;
  }
  .zb-btn:hover { background: var(--mid); }
  #zoom-label {
    font-size: .58rem; color: var(--grey);
    min-width: 36px; text-align: center;
    letter-spacing: .06em; pointer-events: none;
  }

  /* Export mode toggle */
  .export-mode {
    display: flex; border: 1px solid var(--line); border-radius: 2px;
    overflow: hidden; flex-shrink: 0;
  }
  .mode-tab {
    background: var(--black); border: none;
    border-right: 1px solid var(--line);
    color: var(--grey); font-family: 'DM Mono', monospace;
    font-size: .58rem; letter-spacing: .08em; text-transform: uppercase;
    padding: 4px 9px; cursor: pointer;
    transition: background .1s, color .1s; white-space: nowrap;
  }
  .mode-tab:last-child { border-right: none; }
  .mode-tab.active { background: var(--white); color: var(--black); }

  /* ── Canvas ─────────────────────────────────────────────── */
  #canvas-wrap {
    position: fixed;
    top: 40px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
    background: var(--black);
  }
  #canvas-wrap.grabbing { cursor: grabbing; }
  #svg-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* ── SVG nodes ──────────────────────────────────────────── */
  .edge {
    fill: none;
    pointer-events: none;
  }
  .node-group { cursor: pointer; }
  .node-rect { transition: opacity .1s; }
  .node-group:hover .node-rect { opacity: .85; }
  .node-group.selected .node-rect {
    stroke: var(--white); stroke-width: 1.5;
  }
  .node-text {
    dominant-baseline: central; text-anchor: middle;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    pointer-events: none; fill: var(--white);
    letter-spacing: .02em;
  }
  .node-text.dark-label { fill: var(--black); }
  .node-img { pointer-events: none; }
  .node-label-bg { pointer-events: none; }
  .node-resize-handle { fill: #f5f5f0; stroke: rgba(0,0,0,0.35); stroke-width: 1; cursor: se-resize; }
  .node-resize-handle:hover { fill: #ddd; }

  /* ── Action panel ───────────────────────────────────────── */
  #action-panel {
    position: fixed;
    background: var(--black);
    border: 1px solid var(--line);
    display: flex; flex-direction: column;
    z-index: 200;
    width: 178px;
    box-shadow: 3px 3px 0 rgba(255,255,255,.04);
  }
  #action-panel.hidden { display: none; }

  .ap-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .82rem; letter-spacing: .18em;
    color: var(--grey);
    padding: .45rem 1rem .3rem;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  .ap-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    padding: .48rem 1rem;
    background: var(--black);
    border: none; border-bottom: 1px solid var(--line);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; text-align: left;
    transition: background .1s;
  }
  .ap-btn:hover { background: var(--mid); }
  .ap-btn .ap-kbd { color: var(--grey); font-size: .54rem; }
  .ap-btn.ap-danger { color: #f87171; }
  .ap-btn.ap-danger:hover { background: #140808; }
  .ap-section {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .72rem; letter-spacing: .18em; color: var(--grey);
    padding: .38rem 1rem .2rem;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  #color-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 3px; padding: 7px;
  }
  .color-swatch {
    width: 20px; height: 20px; border-radius: 0;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .08s, border-color .08s;
  }
  .color-swatch:hover { transform: scale(1.18); border-color: var(--white); }

  /* ── Inline edit ────────────────────────────────────────── */
  #edit-input {
    position: fixed;
    background: #fff; color: #0a0a0a;
    border: 2px solid #0a0a0a; border-radius: 0;
    padding: 4px 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: .02em; text-align: center;
    z-index: 300; outline: none; min-width: 120px;
    line-height: 1.25;
    resize: none; overflow: hidden;
    white-space: pre-wrap;
  }
  #edit-input.hidden { display: none; }

  /* ── Toast ──────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line);
    padding: 5px 14px; font-size: .58rem;
    letter-spacing: .1em; text-transform: uppercase;
    z-index: 500; opacity: 0; transition: opacity .22s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* ── Modal ──────────────────────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    z-index: 400; display: flex;
    align-items: center; justify-content: center;
  }
  #modal-overlay.hidden { display: none; }
  #modal-box {
    background: var(--black); border: 1px solid var(--white);
    padding: 22px; max-width: 300px; width: 90%;
    box-shadow: 5px 5px 0 rgba(255,255,255,.05);
  }
  #modal-box h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: .12em; margin-bottom: 8px;
  }
  #modal-box p {
    font-size: .6rem; color: var(--grey);
    letter-spacing: .05em; line-height: 1.65; margin-bottom: 18px;
  }
  .modal-btns { display: flex; gap: 7px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--mid); }

  /* ── Toolbar account ────────────────────────────────────────── */
  #tb-account { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .sync-dot { font-size: .9rem; line-height: 1; flex-shrink: 0; cursor: default; }
  .account-email {
    font-size: .58rem; color: var(--grey); letter-spacing: .05em;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Auth modal ─────────────────────────────────────────────── */
  #auth-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.82);
    z-index: 450; display: flex;
    align-items: center; justify-content: center;
  }
  #auth-modal.hidden { display: none; }
  #auth-box {
    background: var(--black); border: 1px solid var(--white);
    max-width: 310px; width: 90%;
    box-shadow: 5px 5px 0 rgba(255,255,255,.05);
  }
  .auth-box-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .9rem; letter-spacing: .18em; color: var(--grey);
    padding: .5rem 1.1rem .3rem; border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  .auth-tabs {
    display: flex; border-bottom: 1px solid var(--line);
  }
  .auth-tab {
    flex: 1; background: var(--black); border: none;
    border-right: 1px solid var(--line);
    color: var(--grey); font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .4rem; cursor: pointer; transition: background .1s, color .1s;
  }
  .auth-tab:last-child { border-right: none; }
  .auth-tab.active { background: var(--white); color: var(--black); }
  .auth-box-body {
    padding: .9rem 1.1rem; display: flex; flex-direction: column; gap: .6rem;
  }
  .auth-field { display: flex; flex-direction: column; gap: .22rem; }
  .auth-field label {
    font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; color: var(--grey);
  }
  .auth-field input {
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line); border-radius: 0;
    padding: .42rem .7rem; font-family: 'DM Mono', monospace; font-size: .65rem;
    outline: none; transition: border-color .1s; width: 100%;
  }
  .auth-field input:focus { border-color: var(--white); }
  #auth-error-login { font-size: .58rem; color: #f87171; min-height: .9rem; letter-spacing: .04em; }
  .auth-submit { width: 100%; text-align: center; padding: .5rem; }
  .auth-note { font-size: .6rem; color: var(--grey); letter-spacing: .04em; line-height: 1.65; }
  .auth-steps { display: flex; flex-direction: column; gap: .5rem; }
  .auth-step {
    display: flex; gap: .55rem; align-items: flex-start;
    font-size: .6rem; color: var(--grey); letter-spacing: .04em; line-height: 1.55;
  }
  .auth-step span {
    flex-shrink: 0; width: 16px; height: 16px; border: 1px solid var(--grey);
    display: flex; align-items: center; justify-content: center;
    font-size: .52rem; color: var(--white); margin-top: .05rem;
  }
  .auth-step strong { color: var(--white); }
  .auth-step code { color: var(--white); font-family: 'DM Mono', monospace; font-size: .58rem; }
  .auth-code {
    background: var(--mid); border: 1px solid var(--line);
    padding: .5rem .7rem; font-family: 'DM Mono', monospace;
    font-size: .56rem; color: #a78bfa; line-height: 1.7;
    letter-spacing: .02em; overflow-x: auto; white-space: pre;
  }
  .auth-config-ta {
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line); border-radius: 0;
    padding: .42rem .7rem; font-family: 'DM Mono', monospace; font-size: .55rem;
    outline: none; transition: border-color .1s; width: 100%;
    min-height: 72px; resize: vertical; line-height: 1.5;
    letter-spacing: .02em;
  }
  .auth-config-ta:focus { border-color: var(--white); }
  .auth-close-bar {
    border-top: 1px solid var(--line); display: flex; padding: 6px;
  }
  .auth-close-bar .tb-btn { flex: 1; text-align: center; }

  /* ── Auth profile view ──────────────────────────────────────── */
  .auth-profile-head {
    display: flex; align-items: center; gap: .75rem;
    padding: .85rem 1.1rem .75rem;
  }
  .auth-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: #5b21b6; border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: .95rem; font-weight: 700; color: #fff;
    flex-shrink: 0; overflow: hidden;
  }
  .auth-profile-info { display: flex; flex-direction: column; gap: .15rem; min-width: 0; }
  .auth-display-name {
    font-size: .7rem; font-weight: 500; color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .auth-profile-email {
    font-size: .57rem; color: var(--grey);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .auth-provider-badge {
    display: inline-flex; align-items: center; gap: .2rem;
    background: var(--mid); border: 1px solid var(--line);
    border-radius: 2px; padding: 1px 5px; align-self: flex-start;
    font-size: .48rem; letter-spacing: .09em; text-transform: uppercase;
    color: var(--grey); margin-top: .15rem;
  }
  .auth-profile-sep { height: 1px; background: var(--line); }
  .auth-profile-section {
    padding: .6rem 1.1rem; display: flex; flex-direction: column; gap: .35rem;
  }
  .auth-section-label {
    font-size: .52rem; text-transform: uppercase;
    letter-spacing: .1em; color: var(--grey); margin-bottom: .05rem;
  }
  .auth-sync-row { display: flex; align-items: center; gap: .4rem; }
  .auth-sync-text { font-size: .6rem; color: var(--grey); }
  .auth-logout-btn { color: #f87171; border-color: #7f1d1d; }
  .auth-logout-btn:hover { background: #7f1d1d; color: #fff; border-color: #b91c1c; }

  /* ── Maps modal ────────────────────────────────────────────── */
  #maps-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.82);
    z-index: 450; display: flex;
    align-items: center; justify-content: center;
  }
  #maps-modal.hidden { display: none; }
  #maps-box {
    background: var(--black); border: 1px solid var(--white);
    max-width: 340px; width: 90%;
    box-shadow: 5px 5px 0 rgba(255,255,255,.05);
    display: flex; flex-direction: column; max-height: 80vh;
  }
  .maps-box-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .9rem; letter-spacing: .18em; color: var(--grey);
    padding: .5rem 1.1rem .3rem; border-bottom: 1px solid var(--line);
    text-transform: uppercase;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  #maps-count { font-family: 'DM Mono',monospace; font-size:.55rem; color:var(--grey); }
  #maps-list { overflow-y: auto; flex: 1; }
  .map-item { display: flex; align-items: center; border-bottom: 1px solid var(--line); }
  .map-item-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--white); margin-left: 1.1rem; flex-shrink: 0; opacity: 0;
  }
  .map-item.active .map-item-dot { opacity: 1; }
  .map-item-name {
    flex: 1; background: none; border: none;
    color: var(--white); font-family: 'DM Mono',monospace;
    font-size: .65rem; letter-spacing: .04em;
    padding: .58rem .7rem; cursor: pointer; text-align: left;
    transition: background .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .map-item.active .map-item-name { font-weight: 500; }
  .map-item-name:hover { background: var(--mid); }
  .map-item-rename, .map-item-del {
    background: none; border: none; color: var(--grey); cursor: pointer;
    padding: .58rem .55rem; font-size: .75rem; transition: color .1s; flex-shrink: 0;
  }
  .map-item-rename:hover { color: var(--white); }
  .map-item-del:hover { color: #f87171; }
  .maps-footer { border-top: 1px solid var(--line); display: flex; gap: 6px; padding: 6px; }
  #btn-maps-new { flex: 1; text-align: center; }
  #active-map-name {
    font-size: .58rem; color: var(--grey); letter-spacing: .05em;
    max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer;
  }
  #active-map-name:hover { color: var(--white); }

  /* ── Style popover ─────────────────────────────────────────── */
  #style-popover {
    position: fixed;
    bottom: 72px; left: 50%; transform: translateX(-50%);
    background: var(--black); border: 1px solid var(--white);
    box-shadow: 0 -4px 20px rgba(0,0,0,.55);
    z-index: 350; display: flex; flex-direction: column;
    min-width: 200px;
  }
  #style-popover.hidden { display: none; }
  .sp-section {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .72rem; letter-spacing: .18em; color: var(--grey);
    padding: .35rem .9rem .2rem;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  .sp-row { padding: .5rem .9rem; border-bottom: 1px solid var(--line); }
  .sp-style-btns { display: flex; flex-direction: column; gap: 3px; }
  .sp-style-btn {
    background: var(--black); border: 1px solid var(--line);
    color: var(--grey); font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .4rem .7rem; cursor: pointer; text-align: left;
    transition: background .1s, color .1s, border-color .1s;
  }
  .sp-style-btn:hover { background: var(--mid); color: var(--white); border-color: #444; }
  .sp-style-btn.active { background: var(--white); color: var(--black); border-color: var(--white); }
  .rx-control {
    display: flex; align-items: center; gap: 8px;
  }
  .rx-label {
    font-size: .58rem; color: var(--grey); letter-spacing: .05em;
    white-space: nowrap; min-width: 46px;
  }
  #rx-slider {
    flex: 1; cursor: pointer;
    accent-color: var(--white);
  }
</style>
</head>
<body>

<div id="toolbar">
  <div style="display:flex;align-items:center;flex-shrink:0">
    <span id="app-logo">MindMap</span>
    <span id="app-sub">/ éditeur</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:center;padding:0 10px;overflow:hidden">
    <span id="active-map-name" title="Gérer les cartes">—</span>
    <button class="tb-btn" id="btn-maps">⊞ Cartes</button>
  </div>
  <div id="tb-account">
    <span class="sync-dot" id="sync-dot" title=""></span>
    <button class="tb-btn" id="btn-account">Compte</button>
  </div>
</div>

<div id="bottom-bar">
  <button class="bb-btn" id="btn-new">+ New</button>
  <div class="bb-sep"></div>
  <button class="bb-btn" id="btn-export-png">↓ PNG</button>
  <button class="bb-btn primary" id="btn-export-pdf">↓ PDF</button>
  <div class="bb-sep"></div>
  <button class="bb-btn" id="btn-style-toggle">Style ▾</button>
  <div class="bb-sep"></div>
  <button class="bb-btn" id="btn-undo">↩</button>
</div>

<div id="zoom-bar">
  <button class="zb-btn" id="btn-zoom-out">−</button>
  <span id="zoom-label">100%</span>
  <button class="zb-btn" id="btn-zoom-in">+</button>
  <button class="zb-btn" id="btn-center" title="Centrer">⊙</button>
</div>

<div id="style-popover" class="hidden">
  <div class="sp-section">Style</div>
  <div class="sp-row sp-style-btns">
    <button class="sp-style-btn active" data-style="0">■ Sombre</button>
    <button class="sp-style-btn" data-style="1">◉ Organique</button>
    <button class="sp-style-btn" data-style="2">□ Papier</button>
  </div>
  <div class="sp-section">Coins</div>

<script>
(() => {
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
const NODE_COLORS = [
  // darks
  { fill: '#2a1f4e', label: false },
  { fill: '#132940', label: false },
  { fill: '#133628', label: false },
  { fill: '#3a1414', label: false },
  { fill: '#3a2a10', label: false },
  { fill: '#133636', label: false },
  // mids
  { fill: '#5b21b6', label: false },
  { fill: '#1d4ed8', label: false },
  { fill: '#15803d', label: false },
  { fill: '#b91c1c', label: false },
  { fill: '#b45309', label: false },
  { fill: '#0f766e', label: false },
  // pastels
  { fill: '#ede9fe', label: true  },
  { fill: '#dbeafe', label: true  },
  { fill: '#dcfce7', label: true  },
  { fill: '#fee2e2', label: true  },
  { fill: '#fef3c7', label: true  },
  { fill: '#ccfbf1', label: true  },
  // extras
  { fill: '#fce7f3', label: true  },
  { fill: '#f3e8ff', label: true  },
  { fill: '#374151', label: false },
  { fill: '#0f172a', label: false },
  { fill: '#c026d3', label: false },
  { fill: '#ea580c', label: false },
];
const ROOT_COLOR = { fill: '#f5f5f0', label: true };

const CHILD_SPREAD = Math.PI / 5;
const CHILD_R  = 220;
const NODE_W   = 130;
const NODE_H   = 38;
const IMG_W    = 152;
const IMG_H    = 112;
const IMG_AREA = 80;
const LBL_H    = 32;
const MIN_Z = 0.12, MAX_Z = 3, STEP_Z = 0.14;
const LS_KEY    = 'mindmap_v3';
const LS_KEY_V2 = 'mindmap_v2';
const MAX_UNDO  = 20;
const MAX_MAPS  = 10;
const SVG_NS    = 'http://www.w3.org/2000/svg';

// ─── Map styles ───────────────────────────────────────────────────────────────
const STYLES = [
  { id:'sombre',    name:'Sombre',    bg:'#0a0a0a', edgeColor:'#303030', edgeW:1.5, rx:3,  rootRx:18, edgeFn:'horizontal' },
  { id:'organique', name:'Organique', bg:'#0f172a', edgeColor:'#1e3a5f', edgeW:2,   rx:14, rootRx:24, edgeFn:'vertical'   },
  { id:'papier',    name:'Papier',    bg:'#fafaf7', edgeColor:'#b8b4aa', edgeW:1.5, rx:0,  rootRx:0,  edgeFn:'straight'   },
];

// ─── State ────────────────────────────────────────────────────────────────────
let nodes = {}, rootId = null, selectedId = null, editingId = null;
let vx = 0, vy = 0, vz = 1;
let mapStyle = 0, nodeRx = STYLES[0].rx;
let panning = false, px0, py0, pvx, pvy;
let dragging = null, dox, doy, dragStartX = 0, dragStartY = 0;
let resizing = null, resizeStartX = 0, resizeStartY = 0, resizeStartW = 0, resizeStartH = 0;
let undoStack = [];
let exportMode = 'dark';
// Multi-map
let activeMapId = null;
let mapList = [];   // [{ id, name, createdAt }]
// _forceSignedOut: set on explicit logout, cleared only on next explicit login attempt.
// Prevents stale Firebase onAuthStateChanged(user) callbacks from re-logging the user in.
let _forceSignedOut = false;
let _pendingConfirm = null;

// ─── DOM ──────────────────────────────────────────────────────────────────────
const wrap    = document.getElementById('canvas-wrap');
const svgRoot = document.getElementById('svg-root');
const defs    = document.getElementById('svg-defs');
const world   = document.getElementById('world');
const eLayer  = document.getElementById('edges-layer');
const nLayer  = document.getElementById('nodes-layer');
const panel   = document.getElementById('action-panel');
const editEl  = document.getElementById('edit-input');
const toastEl = document.getElementById('toast');
const zoomLbl = document.getElementById('zoom-label');
const modal   = document.getElementById('modal-overlay');
// auth + sync (static elements, cached once)
const syncDot          = document.getElementById('sync-dot');
const authModal        = document.getElementById('auth-modal');
const authLoginView    = document.getElementById('auth-login-view');
const authAccountView  = document.getElementById('auth-account-view');
const authModalTitle   = document.getElementById('auth-modal-title');
const authErrorLogin   = document.getElementById('auth-error-login');
const authAvatarImg    = document.getElementById('auth-avatar-img');
const authAvatarLetter = document.getElementById('auth-avatar-letter');
const authDisplayName  = document.getElementById('auth-display-name');
const authAccountEmail = document.getElementById('auth-account-email');
const authProvBadge    = document.getElementById('auth-provider-badge');
const profileSyncIcon  = document.getElementById('auth-profile-sync-icon');
const profileSyncText  = document.getElementById('auth-profile-sync-text');
const rxSlider         = document.getElementById('rx-slider');
const rxValue          = document.getElementById('rx-value');
const spStyleBtns      = [...document.querySelectorAll('.sp-style-btn')];
// Maps modal
const mapsModal        = document.getElementById('maps-modal');
const mapsListEl       = document.getElementById('maps-list');
const mapsCountEl      = document.getElementById('maps-count');
const mapsNewBtn       = document.getElementById('btn-maps-new');
const activeMapNameEl  = document.getElementById('active-map-name');

// ─── Utils ────────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);

let tt;
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

const s2w = (sx, sy) => ({ x: (sx - vx) / vz, y: (sy - vy) / vz });
const w2s = (wx, wy) => ({ x: wx * vz + vx, y: wy * vz + vy });

// Measure text width using a hidden canvas (font-agnostic)
let _txCtx = null;
function textWidth(label) {
  if (!_txCtx) {
    const c = document.createElement('canvas');
    _txCtx = c.getContext('2d');
    _txCtx.font = '400 12px "DM Mono", monospace';
  }
  return _txCtx.measureText(label || '').width;
}
// Lines of a label (split on \n, never empty)
function labelLines(label) {
  const s = (label == null ? '' : String(label));
  return s.split('\n');
}
// Widest line of a multi-line label
function labelMaxWidth(label) {
  const lines = labelLines(label);
  let m = 0;
  for (const line of lines) { const w = textWidth(line); if (w > m) m = w; }
  return m;
}
const LINE_H = 15; // px per line at 12px font, ~1.25 line-height

// Node dimensions — image nodes adapt to aspect ratio; all nodes adapt to label
function nodeDim(n) {
  if (n.manualW) return { w: n.manualW, h: n.manualH || NODE_H };
  if (n.imageData) {
    const r = n.imageAspect || (IMG_W / IMG_AREA); // default ≈ 1.9
    let iw, ih;
    if (r >= 1) {
      // Landscape / square: target image area height ≈ 90px
      ih = 90; iw = Math.round(ih * r);
      if (iw > 280) { iw = 280; ih = Math.round(iw / r); }
      if (iw < 100) { iw = 100; ih = Math.round(iw / r); }
    } else {
      // Portrait: target width ≈ 130px
      iw = 130; ih = Math.min(200, Math.max(80, Math.round(iw / r)));
    }
    // Label bar grows with line count
    const lc = n.label ? labelLines(n.label).length : 0;
    const lblH = lc > 0 ? Math.max(LBL_H, 10 + lc * LINE_H) : 0;
    return { w: iw, h: ih + lblH };
  }
  const lines = labelLines(n.label);
  const maxLine = labelMaxWidth(n.label);
  if (n.isRoot) {
    return {
      w: Math.max(160, Math.ceil(maxLine) + 32),
      h: Math.max(46, 16 + lines.length * LINE_H)
    };
  }
  return {
    w: Math.max(NODE_W, Math.ceil(maxLine) + 24),
    h: Math.max(NODE_H, 12 + lines.length * LINE_H)
  };
}
// Image area height = node height minus optional label bar
function imageAreaH(n) {
  const d = nodeDim(n);
  const lc = n.label ? labelLines(n.label).length : 0;
  const lblH = lc > 0 ? Math.max(LBL_H, 10 + lc * LINE_H) : 0;
  return d.h - lblH;
}
// Label bar height (multi-line aware)
function labelBarH(n) {
  const lc = n.label ? labelLines(n.label).length : 0;
  return lc > 0 ? Math.max(LBL_H, 10 + lc * LINE_H) : 0;
}

// ─── Undo ─────────────────────────────────────────────────────────────────────
function push() {
  undoStack.push(JSON.stringify({ nodes, rootId, selectedId }));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return toast('Rien à annuler');
  const s = JSON.parse(undoStack.pop());
  nodes = s.nodes; rootId = s.rootId; selectedId = s.selectedId;
  cleanOrphans(); save(); renderAll();
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function _writeLocal() {
  try {
    let store;
    try { store = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { store = {}; }
    if (!store.maps) store.maps = {};
    store.activeMapId = activeMapId;
    store.mapList     = mapList;
    store.maps[activeMapId] = { nodes, rootId, vx, vy, vz, mapStyle, nodeRx };
    localStorage.setItem(LS_KEY, JSON.stringify(store));
  } catch(e) {}
}
function save()      { _writeLocal(); scheduleSave(); }
function saveLocal() { _writeLocal(); }
function load() {
  try {
    // New multi-map format
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.maps && d.activeMapId) {
        mapList     = d.mapList || [];
        activeMapId = d.activeMapId;
        const md    = d.maps[activeMapId];
        if (md && md.nodes) {
          nodes = md.nodes; rootId = md.rootId;
          vx = md.vx||0; vy = md.vy||0; vz = md.vz||1;
          if (md.mapStyle != null) mapStyle = md.mapStyle;
          if (md.nodeRx   != null) nodeRx   = md.nodeRx;
          return true;
        }
      }
    }
    // Migrate from v2
    const v2raw = localStorage.getItem(LS_KEY_V2);
    if (v2raw) {
      const d = JSON.parse(v2raw);
      if (d && d.nodes) {
        const id = uid();
        activeMapId = id;
        mapList = [{ id, name: 'Carte 1', createdAt: Date.now() }];
        nodes = d.nodes; rootId = d.rootId;
        vx = d.vx||0; vy = d.vy||0; vz = d.vz||1;
        if (d.mapStyle != null) mapStyle = d.mapStyle;
        if (d.nodeRx   != null) nodeRx   = d.nodeRx;
        _writeLocal();
        return true;
      }
    }
    return false;
  } catch(e) { return false; }
}

// ─── Default map ──────────────────────────────────────────────────────────────
function initMap() {
  nodes = {};
  const cx = innerWidth / 2, cy = (innerHeight - 40) / 2 + 40;
  const r = { id: uid(), label: 'Idée centrale', x: cx, y: cy, parentId: null, children: [], colorIndex: -1, isRoot: true };
  nodes[r.id] = r; rootId = r.id;
  ['Thème 1','Thème 2','Thème 3'].forEach((lbl, i) => {
    const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
    const c = { id: uid(), label: lbl, x: cx + Math.cos(angle)*CHILD_R, y: cy + Math.sin(angle)*CHILD_R, parentId: r.id, children: [], colorIndex: i+1 };
    nodes[c.id] = c; r.children.push(c.id);
  });
  vx = 0; vy = 0; vz = 1;
}

// ─── Layout ───────────────────────────────────────────────────────────────────
function childPos(parent) {
  let base = -Math.PI / 2;
  if (parent.parentId && nodes[parent.parentId])
    base = Math.atan2(parent.y - nodes[parent.parentId].y, parent.x - nodes[parent.parentId].x);
  const existing  = parent.children.map(c => nodes[c]).filter(Boolean);
  const usedAngles = existing.map(c => Math.atan2(c.y - parent.y, c.x - parent.x));
  const allNodes  = Object.values(nodes);
  const GAP = 18; // min px gap between node edges

  function freeAt(cx, cy) {
    return !allNodes.some(n => {
      if (n.id === parent.id) return false;
      const { w, h } = nodeDim(n);
      return Math.abs(cx - n.x) < (w / 2 + NODE_W / 2 + GAP) &&
             Math.abs(cy - n.y) < (h / 2 + NODE_H / 2 + GAP);
    });
  }

  // Try expanding radii and spreading angles until we find a clear spot
  for (let r = CHILD_R; r <= CHILD_R * 3; r += 70) {
    for (let k = 0; k <= 14; k++) {
      const candidates = k === 0 ? [base] : [base + k * CHILD_SPREAD, base - k * CHILD_SPREAD];
      for (const cand of candidates) {
        if (usedAngles.length) {
          const minD = usedAngles.reduce((m, a) => {
            let d = Math.abs(cand - a) % (2 * Math.PI);
            if (d > Math.PI) d = 2 * Math.PI - d;
            return Math.min(m, d);
          }, Infinity);
          if (minD < CHILD_SPREAD * 0.6) continue;
        }
        const cx = parent.x + Math.cos(cand) * r;
        const cy = parent.y + Math.sin(cand) * r;
        if (freeAt(cx, cy)) return { x: cx, y: cy };
      }
    }
  }
  // Fallback: default angle placement (should rarely be reached)
  const angle = base + existing.length * CHILD_SPREAD;
  return { x: parent.x + Math.cos(angle) * CHILD_R, y: parent.y + Math.sin(angle) * CHILD_R };
}

// ─── Bounds helper ────────────────────────────────────────────────────────────
function mapBounds() {
  const all = Object.values(nodes);
  let x1=Infinity, y1=Infinity, x2=-Infinity, y2=-Infinity;
  all.forEach(n => { const {w,h}=nodeDim(n); x1=Math.min(x1,n.x-w/2); y1=Math.min(y1,n.y-h/2); x2=Math.max(x2,n.x+w/2); y2=Math.max(y2,n.y+h/2); });
  return { all, x1, y1, x2, y2 };
}

// ─── Color helper ─────────────────────────────────────────────────────────────
function nodeColor(n) {
  if (n.isRoot || n.colorIndex < 0) return ROOT_COLOR;
  return NODE_COLORS[n.colorIndex % NODE_COLORS.length];
}

// ─── Render: transform ────────────────────────────────────────────────────────
let _lastZoomPct = -1;
function applyT() {
  world.setAttribute('transform', `translate(${vx},${vy}) scale(${vz})`);
  const pct = Math.round(vz * 100);
  if (pct !== _lastZoomPct) { zoomLbl.textContent = pct + '%'; _lastZoomPct = pct; }
}

// ─── Render: background + edges ───────────────────────────────────────────────
let _lastBgStyle = -1;
function applyBg() {
  if (_lastBgStyle === mapStyle) return;
  wrap.style.background = STYLES[mapStyle].bg;
  _lastBgStyle = mapStyle;
}

function edgePath(p, n) {
  const fn = STYLES[mapStyle].edgeFn;
  if (fn === 'straight') return `M${p.x},${p.y} L${n.x},${n.y}`;
  if (fn === 'vertical') {
    const my = (p.y + n.y) / 2;
    return `M${p.x},${p.y} C${p.x},${my} ${n.x},${my} ${n.x},${n.y}`;
  }
  const mx = (p.x + n.x) / 2;
  return `M${p.x},${p.y} C${mx},${p.y} ${mx},${n.y} ${n.x},${n.y}`;
}

function renderEdge(n) {
  if (!n.parentId) return;
  const p = nodes[n.parentId]; if (!p) return;
  let el = document.getElementById('e-' + n.id);
  if (!el) { el = document.createElementNS(SVG_NS,'path'); el.id = 'e-'+n.id; el.classList.add('edge'); eLayer.appendChild(el); }
  const st = STYLES[mapStyle];
  el.setAttribute('stroke', st.edgeColor);
  el.setAttribute('stroke-width', st.edgeW);
  el.setAttribute('d', edgePath(p, n));
}

// Multi-line SVG text: rebuild <tspan>s, centered vertically around (cx, cy)
function setMultilineText(textEl, label, cx, cy) {
  textEl.textContent = '';
  textEl.setAttribute('x', cx);
  textEl.setAttribute('y', cy);
  const lines = labelLines(label);
  const lh = LINE_H;
  lines.forEach((line, i) => {
    const ts = document.createElementNS(SVG_NS, 'tspan');
    ts.setAttribute('x', cx);
    ts.setAttribute('dy', i === 0 ? -((lines.length - 1) / 2) * lh : lh);
    ts.textContent = line;
    textEl.appendChild(ts);
  });
}

// ─── Render: node ─────────────────────────────────────────────────────────────
function renderNode(n) {
  let g = document.getElementById('n-' + n.id);
  if (!g) {
    g = document.createElementNS(SVG_NS, 'g');
    g.id = 'n-' + n.id; g.classList.add('node-group');
    const rect0 = document.createElementNS(SVG_NS, 'rect');
    rect0.classList.add('node-rect'); g.appendChild(rect0); g._r = rect0;
    const txt0 = document.createElementNS(SVG_NS, 'text');
    txt0.classList.add('node-text'); g.appendChild(txt0); g._t = txt0;
    nLayer.appendChild(g);
    const nid = n.id; // capture id, not live node ref
    g.addEventListener('mousedown', e => onNmd(e, nid));
    g.addEventListener('dblclick',  e => { e.stopPropagation(); startEdit(nid); });
    g.addEventListener('click',     e => e.stopPropagation());
  }

  const { w, h } = nodeDim(n);
  const x = n.x - w/2, y = n.y - h/2;
  const col = nodeColor(n);
  const rx = n.isRoot ? STYLES[mapStyle].rootRx : nodeRx;

  const rect = g._r;
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('fill', col.fill); rect.setAttribute('rx', rx);

  // Manage image elements
  if (n.imageData) {
    // Lazy: detect & store aspect ratio for images uploaded before this feature
    if (!n.imageAspect) {
      const nid = n.id;
      const tmp = new Image();
      tmp.onload = () => {
        if (!nodes[nid] || nodes[nid].imageAspect) return;
        nodes[nid].imageAspect = tmp.naturalWidth / tmp.naturalHeight;
        renderNode(nodes[nid]); renderEdge(nodes[nid]); saveLocal();
      };
      tmp.src = n.imageData;
    }
    // clipPath in defs
    const cid = 'cp-' + n.id;
    let cp = document.getElementById(cid);
    if (!cp) {
      cp = document.createElementNS(SVG_NS, 'clipPath'); cp.id = cid;
      cp.appendChild(document.createElementNS(SVG_NS, 'rect'));
      defs.appendChild(cp);
    }
    const cr = cp.querySelector('rect');
    const hasLabel = !!n.label;
    const ia = imageAreaH(n);
    const imgH = hasLabel ? ia : h;
    cr.setAttribute('x', x); cr.setAttribute('y', y); cr.setAttribute('width', w); cr.setAttribute('height', imgH);

    if (!g._i) {
      g._i = document.createElementNS(SVG_NS, 'image'); g._i.classList.add('node-img');
      g._i.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      g.insertBefore(g._i, g._t);
      g._lb = document.createElementNS(SVG_NS, 'rect'); g._lb.classList.add('node-label-bg');
      g.insertBefore(g._lb, g._t);
    }
    const img = g._i, lbg = g._lb;
    img.setAttribute('x', x); img.setAttribute('y', y);
    img.setAttribute('width', w); img.setAttribute('height', imgH);
    if (img.getAttribute('href') !== n.imageData) {
      img.setAttribute('href', n.imageData); img.setAttribute('xlink:href', n.imageData);
    }
    img.setAttribute('clip-path', `url(#${cid})`); img.removeAttribute('display');

    if (hasLabel) {
      const lblH = labelBarH(n);
      lbg.setAttribute('x', x); lbg.setAttribute('y', y + ia);
      lbg.setAttribute('width', w); lbg.setAttribute('height', lblH);
      lbg.setAttribute('fill', 'rgba(0,0,0,0.6)'); lbg.removeAttribute('display');
      g._t.removeAttribute('fill'); g._t.classList.remove('dark-label');
      g._t.setAttribute('fill', '#f5f5f0');
      setMultilineText(g._t, n.label, n.x, y + ia + lblH / 2);
    } else {
      lbg.setAttribute('display', 'none');
      g._t.textContent = '';
    }
  } else {
    if (g._i)  g._i.setAttribute('display', 'none');
    if (g._lb) g._lb.setAttribute('display', 'none');
    g._t.removeAttribute('fill');
    g._t.classList.toggle('dark-label', !!col.label);
    setMultilineText(g._t, n.label, n.x, n.y);
  }

  g.classList.toggle('selected', selectedId === n.id);

  // Resize handle (bottom-right corner, visible only when selected)
  const RSIZE = Math.max(6, Math.min(14, 10 / vz));
  if (!g._rh) {
    g._rh = document.createElementNS(SVG_NS, 'rect');
    g._rh.classList.add('node-resize-handle');
    g.appendChild(g._rh);
    const nid = n.id;
    g._rh.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      if (!nodes[nid]) return;
      resizing = nid; resizeStartX = e.clientX; resizeStartY = e.clientY;
      const d = nodeDim(nodes[nid]);
      resizeStartW = d.w; resizeStartH = d.h;
    });
  }
  g._rh.setAttribute('x', n.x + w/2 - RSIZE);
  g._rh.setAttribute('y', n.y + h/2 - RSIZE);
  g._rh.setAttribute('width', RSIZE); g._rh.setAttribute('height', RSIZE);
  g._rh.setAttribute('display', selectedId === n.id ? '' : 'none');
}

// ─── Render: full ─────────────────────────────────────────────────────────────
function cleanOrphans() {
  eLayer.querySelectorAll('[id^="e-"]').forEach(el  => { if (!nodes[el.id.slice(2)]) el.remove(); });
  nLayer.querySelectorAll('[id^="n-"]').forEach(el  => { if (!nodes[el.id.slice(2)]) el.remove(); });
  defs.querySelectorAll('[id^="cp-"]').forEach(el   => { if (!nodes[el.id.slice(3)]) el.remove(); });
}
function renderAll() {
  applyBg();
  Object.values(nodes).forEach(n => { renderEdge(n); renderNode(n); });
  applyT();
  if (selectedId) updatePanel();
}

// ─── Select / deselect ────────────────────────────────────────────────────────
function select(id) {
  const prev = selectedId; selectedId = id;
  if (prev && nodes[prev]) renderNode(nodes[prev]);
  if (id  && nodes[id])   renderNode(nodes[id]);
  updatePanel();
  if (editingId && editingId !== id) commitEdit();
}
function deselect() {
  const prev = selectedId; selectedId = null;
  if (prev && nodes[prev]) renderNode(nodes[prev]);
  updatePanel(); commitEdit();
}

// ─── Multi-map management ─────────────────────────────────────────────────────
function updateActiveMapName() {
  const entry = mapList.find(m => m.id === activeMapId);
  activeMapNameEl.textContent = entry ? entry.name : '—';
}

function updateMapsUI() {
  mapsListEl.innerHTML = '';
  mapList.forEach(m => {
    const item = document.createElement('div');
    item.className = 'map-item' + (m.id === activeMapId ? ' active' : '');

    const dot = document.createElement('div'); dot.className = 'map-item-dot';

    const nameBtn = document.createElement('button');
    nameBtn.className = 'map-item-name'; nameBtn.textContent = m.name;
    nameBtn.onclick = () => switchMap(m.id);

    const renBtn = document.createElement('button');
    renBtn.className = 'map-item-rename'; renBtn.textContent = '✎'; renBtn.title = 'Renommer';
    renBtn.onclick = e => { e.stopPropagation(); renameMap(m.id); };

    const delBtn = document.createElement('button');
    delBtn.className = 'map-item-del'; delBtn.textContent = '✕'; delBtn.title = 'Supprimer';
    delBtn.style.visibility = mapList.length <= 1 ? 'hidden' : '';
    delBtn.onclick = e => { e.stopPropagation(); deleteMap(m.id); };

    item.append(dot, nameBtn, renBtn, delBtn);
    mapsListEl.appendChild(item);
  });
  mapsCountEl.textContent = `${mapList.length}/${MAX_MAPS}`;
  mapsNewBtn.disabled = mapList.length >= MAX_MAPS;
  updateActiveMapName();
}

function createMap() {
  if (mapList.length >= MAX_MAPS) { toast(`Limite de ${MAX_MAPS} cartes atteinte`); return; }
  _writeLocal();
  const id   = uid();
  const name = `Carte ${mapList.length + 1}`;
  mapList.push({ id, name, createdAt: Date.now() });
  activeMapId = id;
  selectedId = null; editingId = null; editEl.classList.add('hidden');
  undoStack = []; _lastBgStyle = -1;
  initMap();
  cleanOrphans(); applyStyleUI(); renderAll(); center();
  save();
  mapsModal.classList.add('hidden');
  updateMapsUI();
  toast(`"${name}" créée`);
}

async function switchMap(id) {
  if (id === activeMapId) { mapsModal.classList.add('hidden'); return; }
  _writeLocal();
  let store;
  try { store = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { store = {}; }
  let md = store.maps && store.maps[id];

  if (!md && currentUser && fbDb) {
    setSyncState('syncing');
    try {
      const doc = await fbDb.collection('maps').doc(currentUser.uid).collection('items').doc(id).get();
      if (doc.exists) md = JSON.parse(doc.data().data);
    } catch(e) { console.error('switchMap cloud:', e); }
    setSyncState('idle');
  }
  if (!md || !md.nodes) { toast('Carte introuvable'); return; }

  selectedId = null; editingId = null; editEl.classList.add('hidden');
  undoStack = []; _lastBgStyle = -1;
  activeMapId = id;
  nodes = md.nodes; rootId = md.rootId;
  vx = md.vx||0; vy = md.vy||0; vz = md.vz||1;
  if (md.mapStyle != null) { mapStyle = md.mapStyle; nodeRx = md.nodeRx ?? STYLES[mapStyle].rx; }
  _writeLocal();
  cleanOrphans(); applyStyleUI(); renderAll(); center();
  mapsModal.classList.add('hidden');
  updateMapsUI();
  toast('Carte chargée');
}

function renameMap(id) {
  const entry = mapList.find(m => m.id === id);
  if (!entry) return;
  const newName = prompt('Nouveau nom :', entry.name);
  if (!newName || !newName.trim() || newName.trim() === entry.name) return;
  entry.name = newName.trim();
  _writeLocal(); save(); updateMapsUI();
}

function deleteMap(id) {
  if (mapList.length <= 1) { toast('Impossible de supprimer la seule carte'); return; }
  const entry = mapList.find(m => m.id === id);
  showConfirm(
    'Supprimer ?',
    `"${entry ? entry.name : 'Cette carte'}" sera supprimée définitivement.`,
    () => _doDeleteMap(id)
  );
}
function _doDeleteMap(id) {
  mapList = mapList.filter(m => m.id !== id);
  let store;
  try { store = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { store = {}; }
  if (store.maps) delete store.maps[id];

  if (id === activeMapId) {
    activeMapId = mapList[0].id;
    const md = store.maps && store.maps[activeMapId];
    if (md && md.nodes) {
      nodes = md.nodes; rootId = md.rootId;
      vx = md.vx||0; vy = md.vy||0; vz = md.vz||1;
      if (md.mapStyle != null) { mapStyle = md.mapStyle; nodeRx = md.nodeRx ?? STYLES[mapStyle].rx; }
    } else { initMap(); }
    selectedId = null; editingId = null; editEl.classList.add('hidden');
    undoStack = []; _lastBgStyle = -1;
    cleanOrphans(); applyStyleUI(); renderAll(); center();
  }
  store.activeMapId = activeMapId; store.mapList = mapList;
  try { localStorage.setItem(LS_KEY, JSON.stringify(store)); } catch(e) {}
  if (currentUser && fbDb) cloudDeleteMap(id);
  save(); updateMapsUI(); toast('Carte supprimée');
}

// ─── Action panel ─────────────────────────────────────────────────────────────
const apRemove  = document.getElementById('ap-remove-image');
const apCenterC = document.getElementById('ap-center-children');
const apResetSz = document.getElementById('ap-reset-size');
function updatePanel() {
  if (!selectedId || !nodes[selectedId]) { panel.classList.add('hidden'); return; }
  const n = nodes[selectedId];
  const { w, h } = nodeDim(n);
  const sc = w2s(n.x, n.y);
  const px = sc.x + (w * vz) / 2 + 10;
  const py = sc.y - (h * vz) / 2;
  const clampX = Math.min(px, innerWidth - 186);
  const clampY = Math.max(54, Math.min(py, innerHeight - 340));
  panel.style.left = clampX + 'px'; panel.style.top = clampY + 'px';
  panel.classList.remove('hidden');
  apRemove.style.display  = n.imageData ? '' : 'none';
  apCenterC.style.display = (n.children && n.children.length > 0) ? '' : 'none';
  apResetSz.style.display = n.manualW ? '' : 'none';
}

document.getElementById('ap-reset-size').onclick = () => {
  if (!selectedId || !nodes[selectedId]) return;
  push(); delete nodes[selectedId].manualW; delete nodes[selectedId].manualH;
  renderNode(nodes[selectedId]); renderEdge(nodes[selectedId]);
  nodes[selectedId].children.forEach(c => { if (nodes[c]) renderEdge(nodes[c]); });
  save(); updatePanel();
};

// ─── Color grid ───────────────────────────────────────────────────────────────
function buildColorGrid() {
  const g = document.getElementById('color-grid'); g.innerHTML = '';
  NODE_COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'; sw.style.background = c.fill;
    sw.addEventListener('click', () => {
      if (!selectedId || !nodes[selectedId]) return;
      push(); nodes[selectedId].colorIndex = i;
      renderNode(nodes[selectedId]); save();
    });
    g.appendChild(sw);
  });
}

// ─── Node ops ─────────────────────────────────────────────────────────────────
function addChild(pid) {
  if (!pid || !nodes[pid]) return;
  const p = nodes[pid]; push();
  const pos = childPos(p);
  const c = { id: uid(), label: 'Nouveau', x: pos.x, y: pos.y, parentId: pid, children: [], colorIndex: p.children.length % NODE_COLORS.length };
  nodes[c.id] = c; p.children.push(c.id);
  save(); renderAll(); select(c.id);
  setTimeout(() => startEdit(c.id), 50);
  return c.id;
}
function addSibling(id) {
  if (!id || !nodes[id]) return;
  const n = nodes[id];
  return n.parentId ? addChild(n.parentId) : addChild(id);
}
function centerOnChildren(id) {
  if (!id || !nodes[id]) return;
  const parent   = nodes[id];
  const children = parent.children.map(c => nodes[c]).filter(Boolean);
  if (!children.length) return toast('Pas d\'enfants à redistribuer');
  push();
  // Redistribute children evenly in a fan around the parent (parent stays put)
  let base = -Math.PI / 2;
  if (parent.parentId && nodes[parent.parentId])
    base = Math.atan2(parent.y - nodes[parent.parentId].y, parent.x - nodes[parent.parentId].x);
  const n    = children.length;
  const step = n === 1 ? 0 : Math.min(CHILD_SPREAD, (2 * Math.PI) / n);
  const span = step * (n - 1);
  children.forEach((c, i) => {
    const angle = base - span / 2 + i * step;
    c.x = parent.x + Math.cos(angle) * CHILD_R;
    c.y = parent.y + Math.sin(angle) * CHILD_R;
  });
  save(); renderAll(); toast('Enfants repositionnés');
}

function deleteNode(id) {
  if (!id || !nodes[id]) return;
  if (nodes[id].isRoot) return toast('Impossible de supprimer le nœud racine');
  push();
  function rm(nid) { const n = nodes[nid]; if (!n) return; n.children.forEach(rm); delete nodes[nid]; }
  const par = nodes[nodes[id].parentId];
  if (par) par.children = par.children.filter(c => c !== id);
  rm(id);
  if (selectedId === id) selectedId = null;
  cleanOrphans(); save(); renderAll();
}

// ─── Edit ─────────────────────────────────────────────────────────────────────
function startEdit(id) {
  if (!id || !nodes[id]) return;
  if (editingId) commitEdit();
  editingId = id;
  const n = nodes[id];
  const { w, h } = nodeDim(n);
  const sc = w2s(n.x, n.y);
  const ew = Math.max(w * vz, 140);
  const lblH = n.imageData ? labelBarH(n) : h;
  let et;
  if (n.imageData) { et = sc.y + (h/2 - lblH) * vz; }
  else             { et = sc.y - h/2 * vz; }
  editEl.value = n.label || '';
  editEl.style.left = (sc.x - ew/2) + 'px'; editEl.style.top = et + 'px';
  editEl.style.width = ew + 'px';
  editEl.style.fontSize = Math.max(10, 12 * vz) + 'px';
  editEl.style.height = 'auto';
  editEl.classList.remove('hidden');
  // Auto-size to fit content (1 line minimum)
  requestAnimationFrame(() => {
    editEl.style.height = 'auto';
    editEl.style.height = Math.max(editEl.scrollHeight, 22) + 'px';
  });
  editEl.focus(); editEl.select();
}
function commitEdit() {
  if (!editingId) return;
  const id = editingId; editingId = null;
  editEl.classList.add('hidden');
  if (!nodes[id]) return;
  const n = nodes[id];
  const v = n.imageData ? editEl.value.trim() : (editEl.value.trim() || n.label);
  if (v !== n.label) { push(); n.label = v; renderNode(n); save(); }
}

// ─── Pan / zoom ───────────────────────────────────────────────────────────────
function zoom(z, cx, cy) {
  cx = cx ?? innerWidth/2; cy = cy ?? (innerHeight + 40)/2;
  z = Math.max(MIN_Z, Math.min(MAX_Z, z));
  const f = z / vz;
  vx = cx - (cx - vx)*f; vy = cy - (cy - vy)*f; vz = z;
  applyT(); if (selectedId) updatePanel(); saveLocal();
}
function center() {
  const { x1, y1, x2, y2 } = mapBounds(); if (x1 === Infinity) return;
  const pw=innerWidth, ph=innerHeight-40, pad=90;
  const s = Math.min((pw-pad*2)/(x2-x1), (ph-pad*2)/(y2-y1), 1.5);
  vz = Math.max(MIN_Z, Math.min(MAX_Z, s));
  vx = pw/2 - ((x1+x2)/2)*vz; vy = ph/2+40 - ((y1+y2)/2)*vz;
  applyT(); if (selectedId) updatePanel(); saveLocal();
}

// ─── Events ───────────────────────────────────────────────────────────────────
wrap.addEventListener('mousedown', e => {
  const t = e.target;
  if (t===svgRoot || t===world || t.id==='edges-layer' || t.id==='nodes-layer') {
    panning = true; px0=e.clientX; py0=e.clientY; pvx=vx; pvy=vy;
    wrap.classList.add('grabbing'); deselect();
  }
});
let _rafPending = false, _latestMx = 0, _latestMy = 0;
window.addEventListener('mousemove', e => {
  _latestMx = e.clientX; _latestMy = e.clientY;
  if (!panning && !dragging && !resizing) return;
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => {
    _rafPending = false;
    if (panning) { vx = pvx + _latestMx - px0; vy = pvy + _latestMy - py0; applyT(); }
    if (dragging) {
      if (Math.hypot(_latestMx-dragStartX, _latestMy-dragStartY) < 4) return;
      const pt = s2w(_latestMx, _latestMy);
      nodes[dragging].x = pt.x+dox; nodes[dragging].y = pt.y+doy;
      renderNode(nodes[dragging]); renderEdge(nodes[dragging]);
      nodes[dragging].children.forEach(c => renderEdge(nodes[c]));
      updatePanel();
    }
    if (resizing) {
      const n = nodes[resizing]; if (!n) { resizing = null; return; }
      const dx = (_latestMx - resizeStartX) / vz;
      const dy = (_latestMy - resizeStartY) / vz;
      n.manualW = Math.round(Math.max(50, resizeStartW + dx));
      n.manualH = Math.round(Math.max(20, resizeStartH + dy));
      renderNode(n); renderEdge(n);
      n.children.forEach(c => { if (nodes[c]) renderEdge(nodes[c]); });
      updatePanel();
    }
  });
});
window.addEventListener('mouseup', () => {
  if (panning)  { panning=false; wrap.classList.remove('grabbing'); saveLocal(); }
  if (dragging) { save(); dragging=null; }
  if (resizing) { save(); resizing=null; }
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  // Use proportional zoom so trackpad pinch is smooth (no fixed steps)
  let dy = e.deltaY;
  if (e.deltaMode === 1) dy *= 16; // line → pixels
  if (e.deltaMode === 2) dy *= 300; // page → pixels
  zoom(vz * Math.pow(0.998, dy), e.clientX, e.clientY);
}, { passive: false });

function onNmd(e, id) {
  e.stopPropagation(); if (e.detail===2) return;
  if (!nodes[id]) return;
  select(id);
  const pt = s2w(e.clientX, e.clientY);
  dragging=id; dragStartX=e.clientX; dragStartY=e.clientY;
  dox=nodes[id].x-pt.x; doy=nodes[id].y-pt.y;
}

document.addEventListener('keydown', e => {
  if (e.target === editEl) {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); commitEdit(); }
    // Shift+Enter falls through → textarea inserts a newline
    if (e.key==='Escape') { editEl.value=nodes[editingId]?.label||''; commitEdit(); }
    return;
  }
  // Prevent global shortcuts from firing when a UI button/input has keyboard focus
  if (['BUTTON', 'INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); return; }
  if (!selectedId) return;
  switch(e.key) {
    case 'Tab':      e.preventDefault(); addChild(selectedId); break;
    case 'Enter':    e.preventDefault(); addSibling(selectedId); break;
    case 'Delete': case 'Backspace': e.preventDefault(); deleteNode(selectedId); break;
    case 'Escape':   e.preventDefault(); deselect(); break;
  }
});

// ─── Style popover ────────────────────────────────────────────────────────────
const stylePopover = document.getElementById('style-popover');
document.getElementById('btn-style-toggle').onclick = e => {

document.addEventListener('click', e => {

function applyStyleUI() {
  spStyleBtns.forEach((btn, i) => btn.classList.toggle('active', i === mapStyle));
  rxSlider.value = nodeRx;
  rxValue.textContent = nodeRx;
}
function setMapStyle(idx) {
  mapStyle = idx; nodeRx = STYLES[idx].rx; _lastBgStyle = -1;
  applyStyleUI(); renderAll(); save();
}
spStyleBtns.forEach((btn, i) => btn.addEventListener('click', () => setMapStyle(i)));
rxSlider.addEventListener('input', () => {

// ─── Toolbar ──────────────────────────────────────────────────────────────────
document.getElementById('btn-zoom-in').onclick  = () => zoom(vz+STEP_Z);

  };
  reader.readAsDataURL(file); e.target.value = '';
});

// ─── Export: Canvas 2D renderer (no SVG serialisation) ───────────────────────
function rrect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// object-fit:cover crop for canvas image drawing
function drawCover(ctx, img, x, y, w, h) {
  const srcR = img.naturalWidth / img.naturalHeight;
  const dstR = w / h;
  let sx, sy, sw, sh;
  if (srcR > dstR) { sh = img.naturalHeight; sw = sh * dstR; sx = (img.naturalWidth - sw) / 2; sy = 0; }
  else             { sw = img.naturalWidth;  sh = sw / dstR; sx = 0; sy = (img.naturalHeight - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

async function buildCanvas() {
  const { all, x1: bx1, y1: by1, x2: bx2, y2: by2 } = mapBounds();
  if (!all.length) return null;
  let x1=bx1, y1=by1, x2=bx2, y2=by2;
  const PAD = 64, S = 3;
  x1-=PAD; y1-=PAD; x2+=PAD; y2+=PAD;
  const W = Math.round((x2-x1)*S), H = Math.round((y2-y1)*S);

  // Pre-load images
  const imgCache = {};
  await Promise.all(all.filter(n=>n.imageData).map(n => new Promise(res => {
    const im = new Image(); im.onload = ()=>{ imgCache[n.id]=im; res(); }; im.onerror=res; im.src=n.imageData;
  })));
  await document.fonts.ready;

  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');
  const tx = wx => (wx-x1)*S, ty = wy => (wy-y1)*S, ts = s => s*S;

  const isLight = exportMode === 'light';
  const st = STYLES[mapStyle];
  const BG       = isLight ? '#f5f5f0' : st.bg;
  const EDGE_CLR = isLight ? '#c0c0b8' : st.edgeColor;
  const EDGE_W   = ts(st.edgeW);
  const TXT_DARK = '#0a0a0a';

  ctx.fillStyle = BG; ctx.fillRect(0,0,W,H);

  // Edges
  ctx.strokeStyle = EDGE_CLR; ctx.lineWidth = EDGE_W;
  all.forEach(n => {
    if (!n.parentId) return;
    const p = nodes[n.parentId]; if (!p) return;
    const ex1=tx(p.x), ey1=ty(p.y), ex2=tx(n.x), ey2=ty(n.y);
    ctx.beginPath(); ctx.moveTo(ex1, ey1);
    if (st.edgeFn === 'straight') {
      ctx.lineTo(ex2, ey2);
    } else if (st.edgeFn === 'vertical') {
      const my = (ey1+ey2)/2;
      ctx.bezierCurveTo(ex1,my, ex2,my, ex2,ey2);
    } else {
      const mx = (ex1+ex2)/2;
      ctx.bezierCurveTo(mx,ey1, mx,ey2, ex2,ey2);
    }
    ctx.stroke();
  });

  // Nodes
  for (const n of all) {
    const {w,h} = nodeDim(n);
    const col = nodeColor(n);
    const nx=tx(n.x-w/2), ny=ty(n.y-h/2), nw=ts(w), nh=ts(h);
    const rx = ts(n.isRoot ? st.rootRx : nodeRx);

    ctx.fillStyle = col.fill; rrect(ctx, nx, ny, nw, nh, rx); ctx.fill();

    // Root or Papier style: add border so light nodes don't vanish
    if (n.isRoot && (isLight || st.id === 'papier')) {
      ctx.strokeStyle = '#888'; ctx.lineWidth = ts(1.5);
      rrect(ctx, nx, ny, nw, nh, rx); ctx.stroke();
    }

    function drawLines(label, cx, cy, maxW) {
      const lines = labelLines(label);
      const lh = ts(LINE_H);
      const startY = cy - ((lines.length - 1) / 2) * lh;
      lines.forEach((line, i) => ctx.fillText(line, cx, startY + i * lh, maxW));
    }

    if (n.imageData && imgCache[n.id]) {
      // Clip once to the full node shape — keeps image + label bar inside rounded corners
      ctx.save(); rrect(ctx, nx, ny, nw, nh, rx); ctx.clip();
      if (n.label) {
        const nia = imageAreaH(n);
        const nlb = labelBarH(n);
        drawCover(ctx, imgCache[n.id], nx, ny, nw, ts(nia));
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(nx, ny+ts(nia), nw, ts(nlb));
        ctx.fillStyle = '#f5f5f0'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `${ts(12)}px "DM Mono", monospace`;
        drawLines(n.label, tx(n.x), ny+ts(nia)+ts(nlb)/2, nw-ts(8));
      } else {
        drawCover(ctx, imgCache[n.id], nx, ny, nw, nh);
      }
      ctx.restore();
    } else {
      ctx.fillStyle = col.label ? TXT_DARK : '#f5f5f0';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font = `${ts(12)}px "DM Mono", monospace`;
      drawLines(n.label, tx(n.x), ty(n.y), nw-ts(8));
    }
  }
  return cv;
}

document.getElementById('btn-export-pdf').addEventListener('click', async () => {
  if (!window.jspdf) return toast('jsPDF non chargé, réessayez');
  toast('Génération PDF…');
  const cv = await buildCanvas();
  if (!cv) return toast('Erreur export');
  const { jsPDF } = window.jspdf;
  const data = cv.toDataURL('image/png');
  const mmW=297, mmH=210;
  const ratio = Math.min(mmW/cv.width, mmH/cv.height);
  const iw=cv.width*ratio, ih=cv.height*ratio;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const [pr,pg,pb] = exportMode === 'light' ? [245,245,240] : [10,10,10];
  doc.setFillColor(pr,pg,pb); doc.rect(0,0,mmW,mmH,'F');
  doc.addImage(data,'PNG',(mmW-iw)/2,(mmH-ih)/2,iw,ih);
  doc.save('mindmap.pdf'); toast('PDF téléchargé');
});

function setSyncState(s) {
  currentSyncState = s;
  if (s === 'ok') lastSyncTs = Date.now();
  const labels = { idle: '', syncing: '🔄', ok: '☁', err: '⚠' };
  const titles = { idle: '', syncing: 'Sync…', ok: 'Synchronisé', err: 'Erreur sync' };
  syncDot.textContent = labels[s] || ''; syncDot.title = titles[s] || '';
  updateProfileSyncRow();
}

function fmtSyncTime(ts) {
  if (!ts) return '';
  const secs = Math.round((Date.now() - ts) / 1000);
  if (secs < 5)  return 'à l\'instant';
  if (secs < 60) return 'il y a ' + secs + 's';
  const mins = Math.round(secs / 60);
  if (mins < 60) return 'il y a ' + mins + ' min';
  return 'il y a ' + Math.round(mins / 60) + 'h';
}

function updateProfileSyncRow() {
  if (!profileSyncIcon) return;
  const map = {
    idle:    { icon: '⚪', text: 'Non synchronisé' },
    syncing: { icon: '🔄', text: 'Sauvegarde…' },
    ok:      { icon: '🟢', text: 'Synchronisé' + (lastSyncTs ? ' · ' + fmtSyncTime(lastSyncTs) : '') },
    err:     { icon: '🔴', text: 'Erreur de synchronisation' },
  };
  const s = map[currentSyncState] || map.idle;
  profileSyncIcon.textContent = s.icon;
  profileSyncText.textContent = s.text;
}

function scheduleSave() {
  if (!currentUser || !fbDb) return;
  setSyncState('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(cloudSave, 1500);
}

async function cloudSave() {
  if (!currentUser || !fbDb) return;
  try {
    const ts    = firebase.firestore.FieldValue.serverTimestamp();
    const entry = mapList.find(m => m.id === activeMapId);
    // Save active map data in subcollection
    await fbDb.collection('maps').doc(currentUser.uid)
      .collection('items').doc(activeMapId).set({
        data: JSON.stringify({ nodes, rootId, vx, vy, vz, mapStyle, nodeRx }),
        name: entry ? entry.name : 'Carte',
        updatedAt: ts
      });
    // Update index doc
    await fbDb.collection('maps').doc(currentUser.uid).set({
      version: 2,
      activeMapId,
      mapList: mapList.map(m => ({ id: m.id, name: m.name, createdAt: m.createdAt || 0 })),
      updatedAt: ts
    });
    setSyncState('ok');
  } catch(e) {
    console.error('cloudSave:', e);
    setSyncState('err');
    toast('Erreur sync cloud');
  }
}

async function cloudLoad() {
  if (!currentUser || !fbDb) return false;
  try {
    const idxDoc = await fbDb.collection('maps').doc(currentUser.uid).get();
    if (!idxDoc.exists) return false;
    const idx = idxDoc.data();

    // Migrate old single-map format (no version field, has 'data' field)
    if (idx.data && !idx.version) {
      const d = JSON.parse(idx.data);
      if (!d || !d.nodes) return false;
      const id = uid();
      mapList = [{ id, name: 'Carte 1', createdAt: Date.now() }];
      activeMapId = id;
      nodes = d.nodes; rootId = d.rootId;
      vx = d.vx||0; vy = d.vy||0; vz = d.vz||1;
      if (d.mapStyle != null) { mapStyle = d.mapStyle; nodeRx = d.nodeRx ?? STYLES[mapStyle].rx; }
      _writeLocal();
      cloudSave(); // migrate to new format silently
      return true;
    }

    // New multi-map format
    if (!idx.version || !idx.mapList || !idx.mapList.length) return false;
    mapList = idx.mapList;
    const loadId = idx.activeMapId || mapList[0].id;

    const mapDoc = await fbDb.collection('maps').doc(currentUser.uid)
      .collection('items').doc(loadId).get();
    if (!mapDoc.exists) return false;
    const d = JSON.parse(mapDoc.data().data);
    if (!d || !d.nodes) return false;

    activeMapId = loadId;
    nodes = d.nodes; rootId = d.rootId;
    vx = d.vx||0; vy = d.vy||0; vz = d.vz||1;
    if (d.mapStyle != null) { mapStyle = d.mapStyle; nodeRx = d.nodeRx ?? STYLES[mapStyle].rx; }
    _writeLocal();
    return true;
  } catch(e) {
    console.error('cloudLoad:', e);
    return false;
  }
}

async function cloudDeleteMap(id) {
  if (!currentUser || !fbDb) return;
  try {
    await fbDb.collection('maps').doc(currentUser.uid).collection('items').doc(id).delete();
    await fbDb.collection('maps').doc(currentUser.uid).set({
      version: 2, activeMapId,
      mapList: mapList.map(m => ({ id: m.id, name: m.name, createdAt: m.createdAt || 0 })),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.error('cloudDeleteMap:', e); }
}

function updateProfileView(user) {
  if (!user) return;
  const letter = (user.displayName || user.email || '?')[0].toUpperCase();
  if (user.photoURL) {
    authAvatarImg.src = user.photoURL;
    authAvatarImg.style.display = 'block';
    authAvatarLetter.style.display = 'none';
  } else {
    authAvatarImg.style.display = 'none';
    authAvatarLetter.style.display = ''; authAvatarLetter.textContent = letter;
  }
  authDisplayName.textContent  = user.displayName || user.email.split('@')[0];
  authAccountEmail.textContent = user.email;
  const prov = (user.providerData && user.providerData[0] && user.providerData[0].providerId) || 'password';
  const provLabels = { 'google.com': '● Google', 'microsoft.com': '⊞ Microsoft', 'password': '✉ Email' };
  authProvBadge.textContent = provLabels[prov] || prov;
  updateProfileSyncRow();
}

function handleAuthChange(user) {
  if (_forceSignedOut && user) {
    // Stale auth callback after explicit sign-out — push it back out immediately
    if (fbAuth) fbAuth.signOut().catch(() => {});
    return;
  }
  currentUser = user;
  setAccountUI(user);
  if (!authModal.classList.contains('hidden')) openAuthModal();
  if (user) {
    updateProfileView(user);
    cloudLoad().then(loaded => {
      if (loaded) {
        selectedId = null; editingId = null;
        editEl.classList.add('hidden');
        undoStack = [];
        _lastBgStyle = -1;
        cleanOrphans();
        applyStyleUI();
        renderAll(); center();
        updateMapsUI();
        toast('Carte chargée depuis le cloud');
      } else {
        setSyncState('idle');
      }
    });
  }
}

function initFirebase(config) {
  try {
    // Reuse existing app so IndexedDB auth token survives page reloads
    try { fbApp = firebase.app('mindmap'); }
    catch(e) { fbApp = firebase.initializeApp(config, 'mindmap'); }
    fbAuth = fbApp.auth();
    fbDb   = fbApp.firestore();
    fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
    fbAuth.onAuthStateChanged(handleAuthChange);
    return true;
  } catch(e) {
    console.error('initFirebase:', e);
    return false;
  }
}

function tryLoadFirebase() {
  setAccountUI(null, true); // show pending state
  try { return initFirebase(FB_CONFIG); } catch(e) { setAccountUI(null); return false; }
}

const POPUP_MSGS = {
  'auth/popup-closed-by-user': 'Fenêtre fermée.',
  'auth/unauthorized-domain': 'Domaine non autorisé — ajoutez vl8d.github.io dans Firebase Auth → Authorized domains.',
};
async function signInWithProvider(btnId, makeProvider, successMsg) {
  _forceSignedOut = false;  // user is actively trying to log in
  authErrorLogin.textContent = '';
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  try {
    const result = await fbAuth.signInWithPopup(makeProvider());
    // Firebase fires onAuthStateChanged synchronously before this line in v8,
    // so currentUser is already set. If not (timing edge case), set it manually.
    if (result.user && !currentUser) handleAuthChange(result.user);
    authModal.classList.add('hidden');
    toast(successMsg);
  } catch(e) {
    authErrorLogin.textContent = POPUP_MSGS[e.code] || e.message;
  }
  btn.disabled = false;
}

btnAuthSubmit.onclick = async () => {
  _forceSignedOut = false;  // user is actively trying to log in
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  authErrorLogin.textContent = '';
  if (!email || !pass) { authErrorLogin.textContent = 'Email et mot de passe requis.'; return; }
  if (!fbAuth) { authErrorLogin.textContent = 'Firebase non initialisé.'; return; }
  btnAuthSubmit.disabled = true; btnAuthSubmit.textContent = '…';
  try {
    let cred;
    if (authMode === 'register') cred = await fbAuth.createUserWithEmailAndPassword(email, pass);
    else                         cred = await fbAuth.signInWithEmailAndPassword(email, pass);
    if (cred.user && !currentUser) handleAuthChange(cred.user);
    authModal.classList.add('hidden');
    toast(authMode === 'register' ? 'Compte créé !' : 'Connecté !');
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Email déjà utilisé.',
      'auth/invalid-email': 'Email invalide.',
      'auth/weak-password': 'Mot de passe trop faible (6 car. min).',
      'auth/user-not-found': 'Aucun compte avec cet email.',
      'auth/wrong-password': 'Mot de passe incorrect.',
      'auth/invalid-credential': 'Identifiants invalides.',
    };
    authErrorLogin.textContent = msgs[e.code] || e.message;
  }
  btnAuthSubmit.disabled = false;
  btnAuthSubmit.textContent = authMode === 'register' ? "S'inscrire" : 'Se connecter';
};
