<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --grey:  #888;
    --mid:   #1a1a1a;
    --line:  #252525;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--black);
    color: var(--white);
    user-select: none;
  }

  /* ── Toolbar ────────────────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0; height: 46px;
    background: var(--black);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 1.1rem;
    z-index: 100;
  }
  #app-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: .12em;
    color: var(--white);
    flex-shrink: 0;
  }
  #app-sub {
    font-size: .65rem;
    color: var(--grey);
    letter-spacing: .05em;
    margin-left: .4rem;
    margin-right: .6rem;
    flex-shrink: 0;
  }
  .tb-sep {
    width: 1px; height: 18px;
    background: var(--line);
    margin: 0 3px; flex-shrink: 0;
  }
  .tb-btn {
    background: var(--mid);
    color: var(--white);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 4px 11px;
    font-family: 'DM Mono', monospace;
    font-size: .6rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .1s, border-color .1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tb-btn:hover  { background: #2a2a2a; border-color: #444; }
  .tb-btn:active { background: #333; }
  .tb-btn.primary { background: var(--white); color: var(--black); border-color: var(--white); }
  .tb-btn.primary:hover { background: #ddd; border-color: #ddd; }

  /* Export mode toggle */
  .export-mode {
    display: flex; border: 1px solid var(--line); border-radius: 2px;
    overflow: hidden; flex-shrink: 0;
  }
  .mode-tab {
    background: var(--black); border: none;
    border-right: 1px solid var(--line);
    color: var(--grey);
    font-family: 'DM Mono', monospace; font-size: .58rem;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 4px 9px; cursor: pointer;
    transition: background .1s, color .1s; white-space: nowrap;
  }
  .mode-tab:last-child { border-right: none; }
  .mode-tab.active { background: var(--white); color: var(--black); }
  #zoom-label {
    font-size: .6rem; color: var(--grey);
    min-width: 34px; text-align: center;
    letter-spacing: .08em; flex-shrink: 0;
  }
  .tb-hints {
    margin-left: auto;
    display: flex; gap: 1rem; flex-shrink: 0;
  }
  .tb-hint {
    font-size: .52rem; color: var(--grey);
    letter-spacing: .06em; text-transform: uppercase;
  }
  .tb-hint kbd {
    font-family: 'DM Mono', monospace;
    font-size: .52rem; color: var(--white);
  }

  /* ── Canvas ─────────────────────────────────────────────── */
  #canvas-wrap {
    position: fixed;
    top: 46px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
    background: var(--black);
  }
  #canvas-wrap.grabbing { cursor: grabbing; }
  #svg-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* ── SVG nodes ──────────────────────────────────────────── */
  .edge {
    fill: none;
    pointer-events: none;
  }
  .node-group { cursor: pointer; }
  .node-rect { transition: opacity .1s; }
  .node-group:hover .node-rect { opacity: .85; }
  .node-group.selected .node-rect {
    stroke: var(--white); stroke-width: 1.5;
  }
  .node-text {
    dominant-baseline: central; text-anchor: middle;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    pointer-events: none; fill: var(--white);
    letter-spacing: .02em;
  }
  .node-text.dark-label { fill: var(--black); }
  .node-img { pointer-events: none; }
  .node-label-bg { pointer-events: none; }

  /* ── Action panel ───────────────────────────────────────── */
  #action-panel {
    position: fixed;
    background: var(--black);
    border: 1px solid var(--line);
    display: flex; flex-direction: column;
    z-index: 200;
    width: 178px;
    box-shadow: 3px 3px 0 rgba(255,255,255,.04);
  }
  #action-panel.hidden { display: none; }

  .ap-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .82rem; letter-spacing: .18em;
    color: var(--grey);
    padding: .45rem 1rem .3rem;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  .ap-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    padding: .48rem 1rem;
    background: var(--black);
    border: none; border-bottom: 1px solid var(--line);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; text-align: left;
    transition: background .1s;
  }
  .ap-btn:hover { background: var(--mid); }
  .ap-btn .ap-kbd { color: var(--grey); font-size: .54rem; }
  .ap-btn.ap-danger { color: #f87171; }
  .ap-btn.ap-danger:hover { background: #140808; }
  .ap-section {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .72rem; letter-spacing: .18em; color: var(--grey);
    padding: .38rem 1rem .2rem;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  #color-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 3px; padding: 7px;
  }
  .color-swatch {
    width: 20px; height: 20px; border-radius: 0;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .08s, border-color .08s;
  }
  .color-swatch:hover { transform: scale(1.18); border-color: var(--white); }

  /* ── Inline edit ────────────────────────────────────────── */
  #edit-input {
    position: fixed;
    background: #fff; color: #0a0a0a;
    border: 2px solid #0a0a0a; border-radius: 0;
    padding: 4px 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: .02em; text-align: center;
    z-index: 300; outline: none; min-width: 120px;
  }
  #edit-input.hidden { display: none; }

  /* ── Toast ──────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line);
    padding: 5px 14px; font-size: .58rem;
    letter-spacing: .1em; text-transform: uppercase;
    z-index: 500; opacity: 0; transition: opacity .22s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* ── Modal ──────────────────────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    z-index: 400; display: flex;
    align-items: center; justify-content: center;
  }
  #modal-overlay.hidden { display: none; }
  #modal-box {
    background: var(--black); border: 1px solid var(--white);
    padding: 22px; max-width: 300px; width: 90%;
    box-shadow: 5px 5px 0 rgba(255,255,255,.05);
  }
  #modal-box h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: .12em; margin-bottom: 8px;
  }
  #modal-box p {
    font-size: .6rem; color: var(--grey);
    letter-spacing: .05em; line-height: 1.65; margin-bottom: 18px;
  }
  .modal-btns { display: flex; gap: 7px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--mid); }

  /* ── Toolbar account ────────────────────────────────────────── */
  #tb-account { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .sync-dot { font-size: .9rem; line-height: 1; flex-shrink: 0; cursor: default; }
  .account-email {
    font-size: .58rem; color: var(--grey); letter-spacing: .05em;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Auth modal ─────────────────────────────────────────────── */
  #auth-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.82);
    z-index: 450; display: flex;
    align-items: center; justify-content: center;
  }
  #auth-modal.hidden { display: none; }
  #auth-box {
    background: var(--black); border: 1px solid var(--white);
    max-width: 310px; width: 90%;
    box-shadow: 5px 5px 0 rgba(255,255,255,.05);
  }
  .auth-box-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .9rem; letter-spacing: .18em; color: var(--grey);
    padding: .5rem 1.1rem .3rem; border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  .auth-tabs {
    display: flex; border-bottom: 1px solid var(--line);
  }
  .auth-tab {
    flex: 1; background: var(--black); border: none;
    border-right: 1px solid var(--line);
    color: var(--grey); font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .4rem; cursor: pointer; transition: background .1s, color .1s;
  }
  .auth-tab:last-child { border-right: none; }
  .auth-tab.active { background: var(--white); color: var(--black); }
  .auth-box-body {
    padding: .9rem 1.1rem; display: flex; flex-direction: column; gap: .6rem;
  }
  .auth-field { display: flex; flex-direction: column; gap: .22rem; }
  .auth-field label {
    font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; color: var(--grey);
  }
  .auth-field input {
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line); border-radius: 0;
    padding: .42rem .7rem; font-family: 'DM Mono', monospace; font-size: .65rem;
    outline: none; transition: border-color .1s; width: 100%;
  }
  .auth-field input:focus { border-color: var(--white); }
  #auth-error { font-size: .58rem; color: #f87171; min-height: .9rem; letter-spacing: .04em; }
  .auth-submit { width: 100%; text-align: center; padding: .5rem; }
  .auth-note { font-size: .6rem; color: var(--grey); letter-spacing: .04em; line-height: 1.65; }
  .auth-steps { display: flex; flex-direction: column; gap: .5rem; }
  .auth-step {
    display: flex; gap: .55rem; align-items: flex-start;
    font-size: .6rem; color: var(--grey); letter-spacing: .04em; line-height: 1.55;
  }
  .auth-step span {
    flex-shrink: 0; width: 16px; height: 16px; border: 1px solid var(--grey);
    display: flex; align-items: center; justify-content: center;
    font-size: .52rem; color: var(--white); margin-top: .05rem;
  }
  .auth-step strong { color: var(--white); }
  .auth-step code { color: var(--white); font-family: 'DM Mono', monospace; font-size: .58rem; }
  .auth-code {
    background: var(--mid); border: 1px solid var(--line);
    padding: .5rem .7rem; font-family: 'DM Mono', monospace;
    font-size: .56rem; color: #a78bfa; line-height: 1.7;
    letter-spacing: .02em; overflow-x: auto; white-space: pre;
  }
  .auth-config-ta {
    background: var(--mid); color: var(--white);
    border: 1px solid var(--line); border-radius: 0;
    padding: .42rem .7rem; font-family: 'DM Mono', monospace; font-size: .55rem;
    outline: none; transition: border-color .1s; width: 100%;
    min-height: 72px; resize: vertical; line-height: 1.5;
    letter-spacing: .02em;
  }
  .auth-config-ta:focus { border-color: var(--white); }
  .auth-submit { width: 100%; text-align: center; padding: .5rem; }
  .auth-close-bar {
    border-top: 1px solid var(--line); display: flex; padding: 6px;
  }
  .auth-close-bar .tb-btn { flex: 1; text-align: center; }

  /* ── Style popover ─────────────────────────────────────────── */
  #style-popover {
    position: fixed;
    top: 50px; right: 56px;
    background: var(--black); border: 1px solid var(--white);
    box-shadow: 4px 4px 0 rgba(255,255,255,.05);
    z-index: 350; display: flex; flex-direction: column;
    min-width: 180px;
  }
  #style-popover.hidden { display: none; }
  .sp-section {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .72rem; letter-spacing: .18em; color: var(--grey);
    padding: .35rem .9rem .2rem;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  .sp-row { padding: .5rem .9rem; border-bottom: 1px solid var(--line); }
  .sp-style-btns { display: flex; flex-direction: column; gap: 3px; }
  .sp-style-btn {
    background: var(--black); border: 1px solid var(--line);
    color: var(--grey); font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .4rem .7rem; cursor: pointer; text-align: left;
    transition: background .1s, color .1s, border-color .1s;
  }
  .sp-style-btn:hover { background: var(--mid); color: var(--white); border-color: #444; }
  .sp-style-btn.active { background: var(--white); color: var(--black); border-color: var(--white); }
  .rx-control {
    display: flex; align-items: center; gap: 8px;
  }
  .rx-label {
    font-size: .58rem; color: var(--grey); letter-spacing: .05em;
    white-space: nowrap; min-width: 46px;
  }
  #rx-slider {
    flex: 1; cursor: pointer;
    accent-color: var(--white);
  }
</style>
</head>
<body>

<div id="toolbar">
  <span id="app-logo">MindMap</span>
  <span id="app-sub">/ éditeur</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-new">+ New</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-zoom-out">−</button>
  <span id="zoom-label">100%</span>
  <button class="tb-btn" id="btn-zoom-in">+</button>
  <button class="tb-btn" id="btn-center">Center</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-export-png">↓ PNG</button>
  <button class="tb-btn primary" id="btn-export-pdf">↓ PDF</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-undo">↩ Undo</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-style-toggle">Style ▾</button>
  <div class="tb-sep"></div>
  <div id="tb-account">
    <span class="sync-dot" id="sync-dot" title=""></span>
    <button class="tb-btn" id="btn-account">Compte</button>
  </div>
</div>

<div id="style-popover" class="hidden">
  <div class="sp-section">Style</div>
  <div class="sp-row sp-style-btns">
    <button class="sp-style-btn active" data-style="0">■ Sombre</button>
    <button class="sp-style-btn" data-style="1">◉ Organique</button>
    <button class="sp-style-btn" data-style="2">□ Papier</button>
  </div>
  <div class="sp-section">Coins</div>
  <div class="sp-row">
    <div class="rx-control">
      <span class="rx-label">⌐ <span id="rx-value">3</span>px</span>
      <input type="range" id="rx-slider" min="0" max="26" step="1" value="3">
    </div>
  </div>
  <div class="sp-section">Export</div>
  <div class="sp-row">
    <div class="export-mode" style="width:100%">
      <button class="mode-tab active" id="mode-dark" style="flex:1">● Foncé</button>
      <button class="mode-tab" id="mode-light" style="flex:1">○ Clair</button>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <svg id="svg-root" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs id="svg-defs"></defs>
    <g id="world">
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </g>
  </svg>
</div>

<div id="action-panel" class="hidden">
  <div class="ap-header">Node</div>
  <button class="ap-btn" id="ap-add-child">+ Enfant <span class="ap-kbd">Tab</span></button>
  <button class="ap-btn" id="ap-add-sibling">↘ Frère <span class="ap-kbd">Enter</span></button>
  <button class="ap-btn" id="ap-center-children" style="display:none">⊙ Centrer sur enfants</button>
  <button class="ap-btn ap-danger" id="ap-delete">✕ Supprimer <span class="ap-kbd">Del</span></button>
  <div class="ap-section">Image</div>
  <button class="ap-btn" id="ap-set-image">▣ Définir image</button>
  <button class="ap-btn ap-danger" id="ap-remove-image" style="display:none">✕ Retirer image</button>
  <div class="ap-section">Couleur</div>
  <div id="color-grid"></div>
</div>

<input id="img-file-input" type="file" accept="image/*" style="display:none">
<input id="edit-input" class="hidden" type="text">
<div id="toast"></div>

<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <h3>Nouveau plan ?</h3>
    <p>La carte actuelle sera effacée définitivement.</p>
    <div class="modal-btns">
      <button class="tb-btn" id="modal-cancel">Annuler</button>
      <button class="tb-btn primary" id="modal-confirm">Confirmer</button>
    </div>
  </div>
</div>

<div id="auth-modal" class="hidden">
  <div id="auth-box">
    <div class="auth-box-title">Compte</div>

    <div id="auth-setup-view" class="hidden"></div>

    <!-- login / register -->
    <div id="auth-login-view" class="hidden">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Connexion</button>
        <button class="auth-tab" id="tab-register">Inscription</button>
      </div>
      <div class="auth-box-body">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="auth-email" autocomplete="email" placeholder="vous@exemple.com">
        </div>
        <div class="auth-field">
          <label>Mot de passe</label>
          <input type="password" id="auth-password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div id="auth-error-login" class="auth-note" style="color:#f87171;min-height:.9rem"></div>
        <button class="tb-btn primary auth-submit" id="btn-auth-submit">Se connecter</button>
        <div style="display:flex;align-items:center;gap:.5rem;margin:.3rem 0">
          <div style="flex:1;height:1px;background:var(--line)"></div>
          <span style="font-size:.52rem;color:var(--grey);letter-spacing:.08em">OU</span>
          <div style="flex:1;height:1px;background:var(--line)"></div>
        </div>
        <button class="tb-btn auth-submit" id="btn-google-signin" style="display:flex;align-items:center;justify-content:center;gap:.5rem">
          <svg width="14" height="14" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continuer avec Google
        </button>
        <button class="tb-btn auth-submit" id="btn-ms-signin" style="display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.2rem">
          <svg width="14" height="14" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
          Continuer avec Microsoft
        </button>
      </div>
    </div>

    <!-- logged in -->
    <div id="auth-account-view" class="hidden">
      <div class="auth-box-body">
        <div id="auth-account-email" class="auth-note" style="color:var(--white)"></div>
        <div id="auth-sync-status" class="auth-note" style="margin-top:.1rem"></div>
        <button class="tb-btn auth-submit" id="btn-logout" style="margin-top:.4rem">Déconnexion</button>
      </div>
    </div>

    <div class="auth-close-bar">
      <button class="tb-btn" id="btn-close-auth">✕ Fermer</button>
    </div>
  </div>
</div>

<script>
(() => {
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
const NODE_COLORS = [
  // darks
  { fill: '#2a1f4e', label: false },
  { fill: '#132940', label: false },
  { fill: '#133628', label: false },
  { fill: '#3a1414', label: false },
  { fill: '#3a2a10', label: false },
  { fill: '#133636', label: false },
  // mids
  { fill: '#5b21b6', label: false },
  { fill: '#1d4ed8', label: false },
  { fill: '#15803d', label: false },
  { fill: '#b91c1c', label: false },
  { fill: '#b45309', label: false },
  { fill: '#0f766e', label: false },
  // pastels
  { fill: '#ede9fe', label: true  },
  { fill: '#dbeafe', label: true  },
  { fill: '#dcfce7', label: true  },
  { fill: '#fee2e2', label: true  },
  { fill: '#fef3c7', label: true  },
  { fill: '#ccfbf1', label: true  },
  // extras
  { fill: '#fce7f3', label: true  },
  { fill: '#f3e8ff', label: true  },
  { fill: '#374151', label: false },
  { fill: '#0f172a', label: false },
  { fill: '#c026d3', label: false },
  { fill: '#ea580c', label: false },
];
const ROOT_COLOR = { fill: '#f5f5f0', label: true };

const CHILD_SPREAD = Math.PI / 5;
const CHILD_R  = 220;
const NODE_W   = 130;
const NODE_H   = 38;
const IMG_W    = 152;
const IMG_H    = 112;
const IMG_AREA = 80;
const LBL_H    = 32;
const MIN_Z = 0.12, MAX_Z = 3, STEP_Z = 0.14;
const LS_KEY   = 'mindmap_v2';
const MAX_UNDO = 20;
const SVG_NS   = 'http://www.w3.org/2000/svg';

// ─── Map styles ───────────────────────────────────────────────────────────────
const STYLES = [
  { id:'sombre',    name:'Sombre',    bg:'#0a0a0a', edgeColor:'#303030', edgeW:1.5, rx:3,  rootRx:18, edgeFn:'horizontal' },
  { id:'organique', name:'Organique', bg:'#0f172a', edgeColor:'#1e3a5f', edgeW:2,   rx:14, rootRx:24, edgeFn:'vertical'   },
  { id:'papier',    name:'Papier',    bg:'#fafaf7', edgeColor:'#b8b4aa', edgeW:1.5, rx:0,  rootRx:0,  edgeFn:'straight'   },
];

// ─── State ────────────────────────────────────────────────────────────────────
let nodes = {}, rootId = null, selectedId = null, editingId = null;
let vx = 0, vy = 0, vz = 1;
let mapStyle = 0, nodeRx = STYLES[0].rx;
let panning = false, px0, py0, pvx, pvy;
let dragging = null, dox, doy, dragStartX = 0, dragStartY = 0;
let undoStack = [];
let exportMode = 'dark';

// ─── DOM ──────────────────────────────────────────────────────────────────────
const wrap    = document.getElementById('canvas-wrap');
const svgRoot = document.getElementById('svg-root');
const defs    = document.getElementById('svg-defs');
const world   = document.getElementById('world');
const eLayer  = document.getElementById('edges-layer');
const nLayer  = document.getElementById('nodes-layer');
const panel   = document.getElementById('action-panel');
const editEl  = document.getElementById('edit-input');
const toastEl = document.getElementById('toast');
const zoomLbl = document.getElementById('zoom-label');
const modal   = document.getElementById('modal-overlay');

// ─── Utils ────────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);

let tt;
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

const s2w = (sx, sy) => ({ x: (sx - vx) / vz, y: (sy - vy) / vz });
const w2s = (wx, wy) => ({ x: wx * vz + vx, y: wy * vz + vy });

function nodeDim(n) {
  if (n.isRoot)    return { w: 160, h: 46 };
  if (n.imageData) return { w: IMG_W, h: IMG_H };
  return { w: NODE_W, h: NODE_H };
}

// ─── Undo ─────────────────────────────────────────────────────────────────────
function push() {
  undoStack.push(JSON.stringify({ nodes, rootId, selectedId }));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return toast('Rien à annuler');
  const s = JSON.parse(undoStack.pop());
  nodes = s.nodes; rootId = s.rootId; selectedId = s.selectedId;
  save(); renderAll(); updatePanel();
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ nodes, rootId, vx, vy, vz, mapStyle, nodeRx })); } catch(e) {}
  scheduleSave();
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    if (!d) return false;
    nodes = d.nodes; rootId = d.rootId;
    vx = d.vx||0; vy = d.vy||0; vz = d.vz||1;
    if (d.mapStyle != null) mapStyle = d.mapStyle;
    if (d.nodeRx   != null) nodeRx   = d.nodeRx;
    return true;
  } catch(e) { return false; }
}

// ─── Default map ──────────────────────────────────────────────────────────────
function initMap() {
  nodes = {};
  const cx = innerWidth / 2, cy = (innerHeight - 46) / 2 + 46;
  const r = { id: uid(), label: 'Idée centrale', x: cx, y: cy, parentId: null, children: [], colorIndex: -1, isRoot: true };
  nodes[r.id] = r; rootId = r.id;
  ['Thème 1','Thème 2','Thème 3'].forEach((lbl, i) => {
    const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
    const c = { id: uid(), label: lbl, x: cx + Math.cos(angle)*CHILD_R, y: cy + Math.sin(angle)*CHILD_R, parentId: r.id, children: [], colorIndex: i+1 };
    nodes[c.id] = c; r.children.push(c.id);
  });
  vx = 0; vy = 0; vz = 1;
}

// ─── Layout ───────────────────────────────────────────────────────────────────
function childPos(parent, count) {
  let base = -Math.PI / 2;
  if (parent.parentId && nodes[parent.parentId])
    base = Math.atan2(parent.y - nodes[parent.parentId].y, parent.x - nodes[parent.parentId].x);
  const spread = CHILD_SPREAD * count;
  const angle = count === 0 ? base : base - spread / 2 + CHILD_SPREAD * count;
  return { x: parent.x + Math.cos(angle) * CHILD_R, y: parent.y + Math.sin(angle) * CHILD_R };
}

// ─── Color helper ─────────────────────────────────────────────────────────────
function nodeColor(n) {
  if (n.isRoot || n.colorIndex < 0) return ROOT_COLOR;
  return NODE_COLORS[n.colorIndex % NODE_COLORS.length];
}

// ─── Render: transform ────────────────────────────────────────────────────────
function applyT() {
  world.setAttribute('transform', `translate(${vx},${vy}) scale(${vz})`);
  zoomLbl.textContent = Math.round(vz * 100) + '%';
}

// ─── Render: background + edges ───────────────────────────────────────────────
function applyBg() {
  wrap.style.background = STYLES[mapStyle].bg;
}

function edgePath(p, n) {
  const fn = STYLES[mapStyle].edgeFn;
  if (fn === 'straight') return `M${p.x},${p.y} L${n.x},${n.y}`;
  if (fn === 'vertical') {
    const my = (p.y + n.y) / 2;
    return `M${p.x},${p.y} C${p.x},${my} ${n.x},${my} ${n.x},${n.y}`;
  }
  const mx = (p.x + n.x) / 2;
  return `M${p.x},${p.y} C${mx},${p.y} ${mx},${n.y} ${n.x},${n.y}`;
}

function renderEdge(n) {
  if (!n.parentId) return;
  const p = nodes[n.parentId]; if (!p) return;
  let el = document.getElementById('e-' + n.id);
  if (!el) { el = document.createElementNS(SVG_NS,'path'); el.id = 'e-'+n.id; el.classList.add('edge'); eLayer.appendChild(el); }
  const st = STYLES[mapStyle];
  el.setAttribute('stroke', st.edgeColor);
  el.setAttribute('stroke-width', st.edgeW);
  el.setAttribute('d', edgePath(p, n));
}

// ─── Render: node ─────────────────────────────────────────────────────────────
function renderNode(n) {
  let g = document.getElementById('n-' + n.id);
  if (!g) {
    g = document.createElementNS(SVG_NS, 'g');
    g.id = 'n-' + n.id; g.classList.add('node-group');
    g.appendChild(Object.assign(document.createElementNS(SVG_NS,'rect'), {}));
    g.querySelector('rect').classList.add('node-rect');
    const txt = document.createElementNS(SVG_NS, 'text');
    txt.classList.add('node-text'); g.appendChild(txt);
    nLayer.appendChild(g);
    g.addEventListener('mousedown', e => onNmd(e, n.id));
    g.addEventListener('dblclick',  e => { e.stopPropagation(); startEdit(n.id); });
    g.addEventListener('click',     e => { e.stopPropagation(); select(n.id); });
  }

  const { w, h } = nodeDim(n);
  const x = n.x - w/2, y = n.y - h/2;
  const col = nodeColor(n);
  const rx = n.isRoot ? STYLES[mapStyle].rootRx : nodeRx;

  const rect = g.querySelector('.node-rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('fill', col.fill); rect.setAttribute('rx', rx);

  // Manage image elements
  if (n.imageData) {
    // clipPath in defs
    const cid = 'cp-' + n.id;
    let cp = document.getElementById(cid);
    if (!cp) {
      cp = document.createElementNS(SVG_NS, 'clipPath'); cp.id = cid;
      cp.appendChild(document.createElementNS(SVG_NS, 'rect'));
      defs.appendChild(cp);
    }
    const cr = cp.querySelector('rect');
    cr.setAttribute('x', x); cr.setAttribute('y', y); cr.setAttribute('width', w); cr.setAttribute('height', IMG_AREA);

    let img = g.querySelector('.node-img');
    if (!img) {
      img = document.createElementNS(SVG_NS, 'image'); img.classList.add('node-img');
      img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      g.insertBefore(img, g.querySelector('.node-text'));
    }
    img.setAttribute('x', x); img.setAttribute('y', y);
    img.setAttribute('width', w); img.setAttribute('height', IMG_AREA);
    img.setAttribute('href', n.imageData); img.setAttribute('xlink:href', n.imageData);
    img.setAttribute('clip-path', `url(#${cid})`); img.removeAttribute('display');

    let lbg = g.querySelector('.node-label-bg');
    if (!lbg) {
      lbg = document.createElementNS(SVG_NS, 'rect'); lbg.classList.add('node-label-bg');
      g.insertBefore(lbg, g.querySelector('.node-text'));
    }
    lbg.setAttribute('x', x); lbg.setAttribute('y', y + IMG_AREA);
    lbg.setAttribute('width', w); lbg.setAttribute('height', LBL_H);
    lbg.setAttribute('fill', 'rgba(0,0,0,0.6)'); lbg.removeAttribute('display');

    const txt = g.querySelector('.node-text');
    txt.setAttribute('x', n.x); txt.setAttribute('y', y + IMG_AREA + LBL_H / 2);
    txt.textContent = n.label; txt.removeAttribute('fill'); txt.classList.remove('dark-label');
    txt.setAttribute('fill', '#f5f5f0');
  } else {
    const imgEl = g.querySelector('.node-img');    if (imgEl) imgEl.setAttribute('display','none');
    const lbg   = g.querySelector('.node-label-bg'); if (lbg) lbg.setAttribute('display','none');
    const txt = g.querySelector('.node-text');
    txt.setAttribute('x', n.x); txt.setAttribute('y', n.y);
    txt.textContent = n.label; txt.removeAttribute('fill');
    txt.classList.toggle('dark-label', !!col.label);
  }

  g.classList.toggle('selected', selectedId === n.id);
}

// ─── Render: full ─────────────────────────────────────────────────────────────
function cleanOrphans() {
  eLayer.querySelectorAll('[id^="e-"]').forEach(el  => { if (!nodes[el.id.slice(2)]) el.remove(); });
  nLayer.querySelectorAll('[id^="n-"]').forEach(el  => { if (!nodes[el.id.slice(2)]) el.remove(); });
  defs.querySelectorAll('[id^="cp-"]').forEach(el   => { if (!nodes[el.id.slice(3)]) el.remove(); });
}
function renderAll() {
  cleanOrphans();
  applyBg();
  Object.values(nodes).forEach(n => { renderEdge(n); renderNode(n); });
  applyT(); updatePanel();
}

// ─── Select / deselect ────────────────────────────────────────────────────────
function select(id) {
  const prev = selectedId; selectedId = id;
  if (prev && nodes[prev]) renderNode(nodes[prev]);
  if (id  && nodes[id])   renderNode(nodes[id]);
  updatePanel();
  if (editingId && editingId !== id) commitEdit();
}
function deselect() {
  const prev = selectedId; selectedId = null;
  if (prev && nodes[prev]) renderNode(nodes[prev]);
  updatePanel(); commitEdit();
}

// ─── Action panel ─────────────────────────────────────────────────────────────
const apRemove  = document.getElementById('ap-remove-image');
const apCenterC = document.getElementById('ap-center-children');
function updatePanel() {
  if (!selectedId || !nodes[selectedId]) { panel.classList.add('hidden'); return; }
  const n = nodes[selectedId];
  const { w, h } = nodeDim(n);
  const sc = w2s(n.x, n.y);
  const px = sc.x + (w * vz) / 2 + 10;
  const py = sc.y - (h * vz) / 2;
  const clampX = Math.min(px, innerWidth - 186);
  const clampY = Math.max(54, Math.min(py, innerHeight - 340));
  panel.style.left = clampX + 'px'; panel.style.top = clampY + 'px';
  panel.classList.remove('hidden');
  apRemove.style.display  = n.imageData ? '' : 'none';
  apCenterC.style.display = (n.children && n.children.length > 0) ? '' : 'none';
}

// ─── Color grid ───────────────────────────────────────────────────────────────
function buildColorGrid() {
  const g = document.getElementById('color-grid'); g.innerHTML = '';
  NODE_COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'; sw.style.background = c.fill;
    sw.addEventListener('click', () => {
      if (!selectedId || !nodes[selectedId]) return;
      push(); nodes[selectedId].colorIndex = i;
      renderNode(nodes[selectedId]); save();
    });
    g.appendChild(sw);
  });
}

// ─── Node ops ─────────────────────────────────────────────────────────────────
function addChild(pid) {
  if (!pid || !nodes[pid]) return;
  const p = nodes[pid]; push();
  const pos = childPos(p, p.children.length);
  const c = { id: uid(), label: 'Nouveau', x: pos.x, y: pos.y, parentId: pid, children: [], colorIndex: p.children.length % NODE_COLORS.length };
  nodes[c.id] = c; p.children.push(c.id);
  save(); renderAll(); select(c.id);
  setTimeout(() => startEdit(c.id), 50);
  return c.id;
}
function addSibling(id) {
  if (!id || !nodes[id]) return;
  const n = nodes[id];
  return n.parentId ? addChild(n.parentId) : addChild(id);
}
function centerOnChildren(id) {
  if (!id || !nodes[id]) return;
  const children = nodes[id].children.map(c => nodes[c]).filter(Boolean);
  if (!children.length) return;
  push();
  nodes[id].x = children.reduce((s, c) => s + c.x, 0) / children.length;
  nodes[id].y = children.reduce((s, c) => s + c.y, 0) / children.length;
  save(); renderAll(); updatePanel(); toast('Nœud recentré');
}

function deleteNode(id) {
  if (!id || !nodes[id]) return;
  if (nodes[id].isRoot) return toast('Impossible de supprimer le nœud racine');
  push();
  function rm(nid) { const n = nodes[nid]; if (!n) return; n.children.forEach(rm); delete nodes[nid]; }
  const par = nodes[nodes[id].parentId];
  if (par) par.children = par.children.filter(c => c !== id);
  rm(id);
  if (selectedId === id) selectedId = null;
  save(); renderAll();
}

// ─── Edit ─────────────────────────────────────────────────────────────────────
function startEdit(id) {
  if (!id || !nodes[id]) return;
  if (editingId) commitEdit();
  editingId = id;
  const n = nodes[id];
  const { w, h } = nodeDim(n);
  const sc = w2s(n.x, n.y);
  const ew = Math.max(w * vz, 120);
  let eh, et;
  if (n.imageData) { eh = Math.max(LBL_H * vz, 22); et = sc.y + (h/2 - LBL_H) * vz; }
  else             { eh = Math.max(h * vz, 22);      et = sc.y - h/2 * vz; }
  editEl.value = n.label;
  editEl.style.left = (sc.x - ew/2) + 'px'; editEl.style.top = et + 'px';
  editEl.style.width = ew + 'px'; editEl.style.height = eh + 'px';
  editEl.style.fontSize = Math.max(10, 12 * vz) + 'px';
  editEl.classList.remove('hidden'); editEl.focus(); editEl.select();
}
function commitEdit() {
  if (!editingId) return;
  const id = editingId; editingId = null;
  editEl.classList.add('hidden');
  if (!nodes[id]) return;
  const n = nodes[id];
  const v = n.imageData ? editEl.value.trim() : (editEl.value.trim() || n.label);
  if (v !== n.label) { push(); n.label = v; renderNode(n); save(); }
}

// ─── Pan / zoom ───────────────────────────────────────────────────────────────
function zoom(z, cx, cy) {
  cx = cx ?? innerWidth/2; cy = cy ?? (innerHeight + 46)/2;
  z = Math.max(MIN_Z, Math.min(MAX_Z, z));
  const f = z / vz;
  vx = cx - (cx - vx)*f; vy = cy - (cy - vy)*f; vz = z;
  applyT(); updatePanel(); save();
}
function center() {
  const all = Object.values(nodes); if (!all.length) return;
  let x1=Infinity, y1=Infinity, x2=-Infinity, y2=-Infinity;
  all.forEach(n => { const {w,h}=nodeDim(n); x1=Math.min(x1,n.x-w/2); y1=Math.min(y1,n.y-h/2); x2=Math.max(x2,n.x+w/2); y2=Math.max(y2,n.y+h/2); });
  const pw=innerWidth, ph=innerHeight-46, pad=70;
  const s = Math.min((pw-pad*2)/(x2-x1), (ph-pad*2)/(y2-y1), 1.5);
  vz = Math.max(MIN_Z, Math.min(MAX_Z, s));
  vx = pw/2 - ((x1+x2)/2)*vz; vy = ph/2+46 - ((y1+y2)/2)*vz;
  applyT(); updatePanel(); save();
}

// ─── Events ───────────────────────────────────────────────────────────────────
wrap.addEventListener('mousedown', e => {
  const t = e.target;
  if (t===svgRoot || t===world || t.id==='edges-layer' || t.id==='nodes-layer') {
    panning = true; px0=e.clientX; py0=e.clientY; pvx=vx; pvy=vy;
    wrap.classList.add('grabbing'); deselect();
  }
});
window.addEventListener('mousemove', e => {
  if (panning) { vx=pvx+e.clientX-px0; vy=pvy+e.clientY-py0; applyT(); }
  if (dragging) {
    if (Math.hypot(e.clientX-dragStartX, e.clientY-dragStartY) < 4) return;
    const pt = s2w(e.clientX, e.clientY);
    nodes[dragging].x = pt.x+dox; nodes[dragging].y = pt.y+doy;
    renderNode(nodes[dragging]); renderEdge(nodes[dragging]);
    nodes[dragging].children.forEach(c => renderEdge(nodes[c]));
    updatePanel();
  }
});
window.addEventListener('mouseup', () => {
  if (panning) { panning=false; wrap.classList.remove('grabbing'); save(); }
  if (dragging) { save(); dragging=null; }
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(vz + (e.deltaY>0 ? -STEP_Z : STEP_Z), e.clientX, e.clientY);
}, { passive: false });

function onNmd(e, id) {
  e.stopPropagation(); if (e.detail===2) return;
  const pt = s2w(e.clientX, e.clientY);
  dragging=id; dragStartX=e.clientX; dragStartY=e.clientY;
  dox=nodes[id].x-pt.x; doy=nodes[id].y-pt.y;
}

document.addEventListener('keydown', e => {
  if (e.target === editEl) {
    if (e.key==='Enter')  { e.preventDefault(); commitEdit(); }
    if (e.key==='Escape') { editEl.value=nodes[editingId]?.label||''; commitEdit(); }
    return;
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); return; }
  if (!selectedId) return;
  switch(e.key) {
    case 'Tab':      e.preventDefault(); addChild(selectedId); break;
    case 'Enter':    e.preventDefault(); addSibling(selectedId); break;
    case 'Delete': case 'Backspace': e.preventDefault(); deleteNode(selectedId); break;
    case 'Escape':   e.preventDefault(); deselect(); break;
  }
});

// ─── Style popover ────────────────────────────────────────────────────────────
const stylePopover = document.getElementById('style-popover');
document.getElementById('btn-style-toggle').onclick = e => {
  e.stopPropagation();
  stylePopover.classList.toggle('hidden');
};
document.addEventListener('click', e => {
  if (!stylePopover.contains(e.target)) stylePopover.classList.add('hidden');
});

function applyStyleUI() {
  document.querySelectorAll('.sp-style-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === mapStyle);
  });
  document.getElementById('rx-slider').value = nodeRx;
  document.getElementById('rx-value').textContent = nodeRx;
}
function setMapStyle(idx) {
  mapStyle = idx; nodeRx = STYLES[idx].rx;
  applyStyleUI(); renderAll(); save();
}
document.querySelectorAll('.sp-style-btn').forEach((btn, i) => {
  btn.addEventListener('click', () => setMapStyle(i));
});
document.getElementById('rx-slider').addEventListener('input', e => {
  nodeRx = +e.target.value;
  document.getElementById('rx-value').textContent = nodeRx;
  Object.values(nodes).forEach(n => renderNode(n));
  save();
});

// ─── Toolbar ──────────────────────────────────────────────────────────────────
document.getElementById('btn-zoom-in').onclick  = () => zoom(vz+STEP_Z);
document.getElementById('btn-zoom-out').onclick = () => zoom(vz-STEP_Z);

function setExportMode(m) {
  exportMode = m;
  document.getElementById('mode-dark').classList.toggle('active',  m === 'dark');
  document.getElementById('mode-light').classList.toggle('active', m === 'light');
}
document.getElementById('mode-dark').onclick  = () => setExportMode('dark');
document.getElementById('mode-light').onclick = () => setExportMode('light');
document.getElementById('btn-center').onclick   = center;
document.getElementById('btn-undo').onclick     = undo;
document.getElementById('btn-new').onclick      = () => modal.classList.remove('hidden');
document.getElementById('modal-cancel').onclick = () => modal.classList.add('hidden');
document.getElementById('modal-confirm').onclick = () => {
  modal.classList.add('hidden'); undoStack=[]; selectedId=null; editingId=null;
  editEl.classList.add('hidden'); initMap(); save(); renderAll(); center(); toast('Nouvelle carte créée');
};

// ─── Panel buttons ────────────────────────────────────────────────────────────
document.getElementById('ap-add-child').onclick      = () => selectedId && addChild(selectedId);
document.getElementById('ap-add-sibling').onclick    = () => selectedId && addSibling(selectedId);
document.getElementById('ap-center-children').onclick = () => selectedId && centerOnChildren(selectedId);
document.getElementById('ap-delete').onclick         = () => selectedId && deleteNode(selectedId);
document.getElementById('ap-set-image').onclick   = () => selectedId && document.getElementById('img-file-input').click();
document.getElementById('ap-remove-image').onclick = () => {
  if (!selectedId || !nodes[selectedId]) return;
  push(); delete nodes[selectedId].imageData;
  renderNode(nodes[selectedId]); save(); updatePanel();
};

// ─── Image upload ─────────────────────────────────────────────────────────────
document.getElementById('img-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || !selectedId || !nodes[selectedId]) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 600;
      let iw = img.width, ih = img.height;
      if (iw > MAX || ih > MAX) { const r = Math.min(MAX/iw, MAX/ih); iw=Math.round(iw*r); ih=Math.round(ih*r); }
      const cv = document.createElement('canvas'); cv.width=iw; cv.height=ih;
      cv.getContext('2d').drawImage(img, 0, 0, iw, ih);
      push(); nodes[selectedId].imageData = cv.toDataURL('image/jpeg', 0.85);
      renderNode(nodes[selectedId]); renderEdge(nodes[selectedId]); save(); updatePanel(); toast('Image définie');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file); e.target.value = '';
});

// ─── Export: Canvas 2D renderer (no SVG serialisation) ───────────────────────
function rrect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// object-fit:cover crop for canvas image drawing
function drawCover(ctx, img, x, y, w, h) {
  const srcR = img.naturalWidth / img.naturalHeight;
  const dstR = w / h;
  let sx, sy, sw, sh;
  if (srcR > dstR) { sh = img.naturalHeight; sw = sh * dstR; sx = (img.naturalWidth - sw) / 2; sy = 0; }
  else             { sw = img.naturalWidth;  sh = sw / dstR; sx = 0; sy = (img.naturalHeight - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

async function buildCanvas() {
  const all = Object.values(nodes);
  if (!all.length) return null;
  let x1=Infinity, y1=Infinity, x2=-Infinity, y2=-Infinity;
  all.forEach(n => { const {w,h}=nodeDim(n); x1=Math.min(x1,n.x-w/2); y1=Math.min(y1,n.y-h/2); x2=Math.max(x2,n.x+w/2); y2=Math.max(y2,n.y+h/2); });
  const PAD = 64, S = 3;
  x1-=PAD; y1-=PAD; x2+=PAD; y2+=PAD;
  const W = Math.round((x2-x1)*S), H = Math.round((y2-y1)*S);

  // Pre-load images
  const imgCache = {};
  await Promise.all(all.filter(n=>n.imageData).map(n => new Promise(res => {
    const im = new Image(); im.onload = ()=>{ imgCache[n.id]=im; res(); }; im.onerror=res; im.src=n.imageData;
  })));
  await document.fonts.ready;

  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');
  const tx = wx => (wx-x1)*S, ty = wy => (wy-y1)*S, ts = s => s*S;

  const isLight = exportMode === 'light';
  const st = STYLES[mapStyle];
  const BG       = isLight ? '#f5f5f0' : st.bg;
  const EDGE_CLR = isLight ? '#c0c0b8' : st.edgeColor;
  const EDGE_W   = ts(st.edgeW);
  const TXT_DARK = '#0a0a0a';

  ctx.fillStyle = BG; ctx.fillRect(0,0,W,H);

  // Edges
  ctx.strokeStyle = EDGE_CLR; ctx.lineWidth = EDGE_W;
  all.forEach(n => {
    if (!n.parentId) return;
    const p = nodes[n.parentId]; if (!p) return;
    const ex1=tx(p.x), ey1=ty(p.y), ex2=tx(n.x), ey2=ty(n.y);
    ctx.beginPath(); ctx.moveTo(ex1, ey1);
    if (st.edgeFn === 'straight') {
      ctx.lineTo(ex2, ey2);
    } else if (st.edgeFn === 'vertical') {
      const my = (ey1+ey2)/2;
      ctx.bezierCurveTo(ex1,my, ex2,my, ex2,ey2);
    } else {
      const mx = (ex1+ex2)/2;
      ctx.bezierCurveTo(mx,ey1, mx,ey2, ex2,ey2);
    }
    ctx.stroke();
  });

  // Nodes
  for (const n of all) {
    const {w,h} = nodeDim(n);
    const col = nodeColor(n);
    const nx=tx(n.x-w/2), ny=ty(n.y-h/2), nw=ts(w), nh=ts(h);
    const rx = ts(n.isRoot ? st.rootRx : nodeRx);

    ctx.fillStyle = col.fill; rrect(ctx, nx, ny, nw, nh, rx); ctx.fill();

    // Root or Papier style: add border so light nodes don't vanish
    if (n.isRoot && (isLight || st.id === 'papier')) {
      ctx.strokeStyle = '#888'; ctx.lineWidth = ts(1.5);
      rrect(ctx, nx, ny, nw, nh, rx); ctx.stroke();
    }

    if (n.imageData && imgCache[n.id]) {
      ctx.save(); rrect(ctx, nx, ny, nw, ts(IMG_AREA), rx); ctx.clip();
      drawCover(ctx, imgCache[n.id], nx, ny, nw, ts(IMG_AREA)); ctx.restore();
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(nx, ny+ts(IMG_AREA), nw, ts(LBL_H));
      if (n.label) {
        ctx.fillStyle = '#f5f5f0'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `${ts(12)}px "DM Mono", monospace`;
        ctx.fillText(n.label, tx(n.x), ny+ts(IMG_AREA)+ts(LBL_H)/2, nw-ts(8));
      }
    } else {
      ctx.fillStyle = col.label ? TXT_DARK : '#f5f5f0';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font = `${ts(12)}px "DM Mono", monospace`;
      ctx.fillText(n.label, tx(n.x), ty(n.y), nw-ts(8));
    }
  }
  return cv;
}

document.getElementById('btn-export-png').addEventListener('click', async () => {
  toast('Génération PNG…');
  const cv = await buildCanvas();
  if (!cv) return toast('Erreur export');
  const a = document.createElement('a'); a.download='mindmap.png'; a.href=cv.toDataURL('image/png'); a.click();
  toast('PNG téléchargé');
});

// ─── Export PDF ───────────────────────────────────────────────────────────────
document.getElementById('btn-export-pdf').addEventListener('click', async () => {
  if (!window.jspdf) return toast('jsPDF non chargé, réessayez');
  toast('Génération PDF…');
  const cv = await buildCanvas();
  if (!cv) return toast('Erreur export');
  const { jsPDF } = window.jspdf;
  const data = cv.toDataURL('image/png');
  const mmW=297, mmH=210;
  const ratio = Math.min(mmW/cv.width, mmH/cv.height);
  const iw=cv.width*ratio, ih=cv.height*ratio;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const [pr,pg,pb] = exportMode === 'light' ? [245,245,240] : [10,10,10];
  doc.setFillColor(pr,pg,pb); doc.rect(0,0,mmW,mmH,'F');
  doc.addImage(data,'PNG',(mmW-iw)/2,(mmH-ih)/2,iw,ih);
  doc.save('mindmap.pdf'); toast('PDF téléchargé');
});

let fbApp = null, fbAuth = null, fbDb = null;

function setSyncState(s) {
  const dot = document.getElementById('sync-dot');
  const labels = { idle: '', syncing: '🔄', ok: '☁', err: '⚠' };
  const titles = { idle: '', syncing: 'Sync…', ok: 'Synchronisé', err: 'Erreur sync' };
  if (dot) { dot.textContent = labels[s] || ''; dot.title = titles[s] || ''; }
  const st = document.getElementById('auth-sync-status');
  if (st) st.textContent = titles[s] || '';
}

function scheduleSave() {
  if (!currentUser || !fbDb) return;
  setSyncState('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(cloudSave, 1500);
}

async function cloudSave() {
  if (!currentUser || !fbDb) return;
  try {
    await fbDb.collection('maps').doc(currentUser.uid).set({
      data: JSON.stringify({ nodes, rootId, vx, vy, vz, mapStyle, nodeRx }),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setSyncState('ok');
  } catch(e) {
    console.error('cloudSave:', e);
    setSyncState('err');
    toast('Erreur sync cloud');
  }
}

async function cloudLoad() {
  if (!currentUser || !fbDb) return false;
  try {
    const doc = await fbDb.collection('maps').doc(currentUser.uid).get();
    if (!doc.exists) return false;
    const d = JSON.parse(doc.data().data);
    if (!d || !d.nodes) return false;
    nodes = d.nodes; rootId = d.rootId;
    vx = d.vx || 0; vy = d.vy || 0; vz = d.vz || 1;
    if (d.mapStyle != null) { mapStyle = d.mapStyle; nodeRx = d.nodeRx ?? STYLES[mapStyle].rx; }
    return true;
  } catch(e) {
    console.error('cloudLoad:', e);
    return false;
  }
}

function setAccountUI(user, pending) {
  const btn = document.getElementById('btn-account');
  const emailEl = document.getElementById('account-email');
  if (pending) { btn.textContent = '…'; return; }
  if (user) {
    btn.textContent = 'Compte ☁';
    if (emailEl) emailEl.textContent = user.email;
  } else {
    btn.textContent = 'Compte';
    if (emailEl) emailEl.textContent = '';
    setSyncState('idle');
  }
}

function handleAuthChange(user) {
  currentUser = user;
  setAccountUI(user);
  if (user) {
    const emailEl = document.getElementById('auth-account-email');
    if (emailEl) emailEl.textContent = 'Connecté : ' + user.email;
    cloudLoad().then(loaded => {
      if (loaded) { renderAll(); center(); toast('Carte chargée depuis le cloud'); }
      else setSyncState('ok');
    });
  }
}

function initFirebase(config) {
  try {
    // Reuse existing app so IndexedDB auth token survives page reloads
    try { fbApp = firebase.app('mindmap'); }
    catch(e) { fbApp = firebase.initializeApp(config, 'mindmap'); }
    fbAuth = fbApp.auth();
    fbDb   = fbApp.firestore();
    fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
    fbAuth.onAuthStateChanged(handleAuthChange);
    return true;
  } catch(e) {
    console.error('initFirebase:', e);
    return false;
  }
}

function tryLoadFirebase() {
  setAccountUI(null, true); // show pending state
  try { return initFirebase(FB_CONFIG); } catch(e) { setAccountUI(null); return false; }
}

function openAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
  document.getElementById('auth-setup-view').classList.add('hidden');
  document.getElementById('auth-login-view').classList.toggle('hidden', !!currentUser);
  document.getElementById('auth-account-view').classList.toggle('hidden', !currentUser);
  document.getElementById('auth-error-login').textContent = '';
  if (currentUser) {
    const el = document.getElementById('auth-account-email');
    if (el) el.textContent = 'Connecté : ' + currentUser.email;
  }
}

document.getElementById('btn-account').onclick  = openAuthModal;
document.getElementById('btn-close-auth').onclick = () => document.getElementById('auth-modal').classList.add('hidden');


let authMode = 'login';
document.getElementById('tab-login').onclick = () => {
  authMode = 'login';
  document.getElementById('tab-login').classList.add('active');
  document.getElementById('tab-register').classList.remove('active');
  document.getElementById('btn-auth-submit').textContent = 'Se connecter';
  document.getElementById('auth-error-login').textContent = '';
};
document.getElementById('tab-register').onclick = () => {
  authMode = 'register';
  document.getElementById('tab-register').classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('btn-auth-submit').textContent = "S'inscrire";
  document.getElementById('auth-error-login').textContent = '';
};

document.getElementById('btn-auth-submit').onclick = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error-login');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Email et mot de passe requis.'; return; }
  if (!fbAuth) { errEl.textContent = 'Firebase non initialisé.'; return; }
  const btn = document.getElementById('btn-auth-submit');
  btn.disabled = true; btn.textContent = '…';
  try {
    if (authMode === 'register') {
      await fbAuth.createUserWithEmailAndPassword(email, pass);
    } else {
      await fbAuth.signInWithEmailAndPassword(email, pass);
    }
    document.getElementById('auth-modal').classList.add('hidden');
    toast(authMode === 'register' ? 'Compte créé !' : 'Connecté !');
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Email déjà utilisé.',
      'auth/invalid-email': 'Email invalide.',
      'auth/weak-password': 'Mot de passe trop faible (6 car. min).',
      'auth/user-not-found': 'Aucun compte avec cet email.',
      'auth/wrong-password': 'Mot de passe incorrect.',
      'auth/invalid-credential': 'Identifiants invalides.',
    };
    errEl.textContent = msgs[e.code] || e.message;
  }
  btn.disabled = false;
  btn.textContent = authMode === 'register' ? "S'inscrire" : 'Se connecter';
};

document.getElementById('btn-google-signin').onclick = async () => {
  const errEl = document.getElementById('auth-error-login');
  errEl.textContent = '';

  try {

    };

};
